<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Журка — план питания на неделю</title>
<style>
  :root{
    --bg:#F4EFE7;--surface:#FFF9F0;--ink:#1F1E1C;--muted:#706B63;--border:#E2D8CA;
    --action:#33262E;--plum:#8C5A72;--plum-soft:#F1E4EA;--warm:#C9874A;--success:#F4EAD8;
    --danger:#9A3E3E;--disabled:#B8B0A5;--r:18px;--shadow:0 16px 40px rgba(51,38,46,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  .app{min-height:100vh;display:grid;grid-template-columns:260px minmax(0,1fr)}
  .side{border-right:1px solid var(--border);padding:22px 18px;background:rgba(255,249,240,.56);min-height:100vh}
  .brand{font-size:1.1rem;font-weight:850;margin-bottom:22px}
  .side-btn{width:100%;border:0;background:var(--action);color:#fff;border-radius:999px;padding:12px 16px;font-weight:800;margin-bottom:22px}
  .nav-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800;margin:18px 0 8px}
  .nav-item{padding:9px 10px;border-radius:12px;color:var(--muted);font-size:.92rem}
  .nav-item.active{background:var(--plum-soft);color:var(--action);font-weight:750}
  .main{padding:34px 28px 70px;display:flex;justify-content:center}
  .shell{width:min(880px,100%)}
  .topbar{display:none}
  .hero{padding:42px;border:1px solid var(--border);border-radius:28px;background:linear-gradient(180deg,#fffaf3 0%,var(--surface) 100%);box-shadow:var(--shadow)}
  .kicker{font-size:.76rem;text-transform:uppercase;letter-spacing:.1em;color:var(--plum);font-weight:850;margin-bottom:12px}
  h1{font-size:clamp(2rem,5vw,3rem);line-height:1.05;letter-spacing:0;font-weight:850;max-width:680px;margin-bottom:14px}
  .lead{font-size:1.05rem;line-height:1.55;color:var(--muted);max-width:620px;margin-bottom:26px}
  .steps-note{border:1px solid var(--border);border-radius:18px;background:rgba(244,234,216,.5);padding:14px 16px;color:var(--muted);line-height:1.5;margin-bottom:20px}
  .btn{border:0;background:var(--action);color:#fff;border-radius:999px;padding:15px 22px;font-weight:850;font-size:1rem}
  .btn.secondary{background:transparent;color:var(--action);border:1.5px solid var(--action)}
  .btn.soft{background:var(--plum-soft);color:var(--action)}
  .btn:disabled{opacity:.55;cursor:default}
  .card{border:1px solid var(--border);border-radius:24px;background:var(--surface);box-shadow:var(--shadow);padding:28px}
  .progress-label{font-size:.82rem;color:var(--muted);font-weight:800;margin-bottom:10px}
  .dots{display:flex;gap:8px;margin-bottom:26px}.dot{width:9px;height:9px;border-radius:50%;background:var(--border)}.dot.on{background:var(--plum)}
  .question{font-size:1.75rem;line-height:1.16;font-weight:850;margin-bottom:22px}
  .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .option{border:1.5px solid var(--border);background:#fffdf8;border-radius:16px;padding:16px;text-align:left;font-weight:800;color:var(--ink)}
  .option.selected{border-color:var(--plum);background:var(--plum-soft);color:var(--action)}
  .fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .field{display:flex;flex-direction:column;gap:7px}.field label{font-size:.86rem;color:var(--muted);font-weight:750}
  input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:14px;background:#fffdf8;color:var(--ink);padding:13px 14px;outline:0}
  textarea{min-height:92px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--plum);box-shadow:0 0 0 3px rgba(140,90,114,.12)}
  .step-actions{display:flex;gap:10px;margin-top:24px;align-items:center}
  .loading{text-align:left;max-width:520px;margin:auto}.loading h2,.result h2{font-size:2rem;margin-bottom:18px}
  .check-list{display:grid;gap:12px;color:var(--muted);font-weight:700}.check{display:flex;gap:10px;align-items:center}.check b{color:#5D4326}
  .result{background:var(--success)}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:20px 0}
  .metric{background:rgba(255,255,255,.52);border:1px solid rgba(93,67,38,.12);border-radius:18px;padding:16px}
  .metric b{display:block;font-size:1.45rem;margin-bottom:4px}.metric span{color:var(--muted);font-size:.9rem;font-weight:700}
  .day-list{display:grid;gap:14px}.day{border:1px solid var(--border);border-radius:20px;background:var(--surface);padding:18px}
  .day-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.day-title{font-size:1.1rem;font-weight:850}
  .meal-lines{line-height:1.8;color:var(--ink)}.meal-lines b{color:var(--action)}
  .day-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.day-actions .btn{padding:10px 14px;font-size:.9rem}
  .sheet-backdrop{position:fixed;inset:0;background:rgba(31,30,28,.32);display:none;z-index:20}.sheet-backdrop.show{display:block}
  .drawer{position:fixed;right:0;top:0;height:100vh;width:min(430px,100%);background:var(--surface);border-left:1px solid var(--border);box-shadow:0 20px 60px rgba(31,30,28,.18);padding:24px;transform:translateX(105%);transition:.22s;z-index:30;overflow:auto}
  .drawer.show{transform:translateX(0)}.drawer-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.x{border:0;background:transparent;font-size:1.6rem;color:var(--muted)}
  .radio-list{display:grid;gap:10px}.radio{border:1.5px solid var(--border);border-radius:14px;padding:14px;background:#fffdf8;font-weight:800;text-align:left}.radio.selected{background:var(--plum-soft);border-color:var(--plum)}
  .memory-note{border:1px solid var(--border);border-radius:16px;background:#fffdf8;padding:14px;margin-top:16px;color:var(--muted);line-height:1.45}
  .bottom-nav{display:none}
  .muted{color:var(--muted)}
  @media(max-width:780px){
    .app{display:block}.side{display:none}.main{padding:12px 12px 84px}.shell{width:100%}.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 14px}.hero{padding:24px 20px;border-radius:24px;box-shadow:none}h1{font-size:2rem}.lead{font-size:.98rem}.card{padding:22px;border-radius:22px;box-shadow:none}.options,.fields,.result-grid{grid-template-columns:1fr}.question{font-size:1.45rem}.step-actions{flex-direction:column}.step-actions .btn{width:100%}.drawer{top:auto;bottom:0;height:min(82vh,680px);width:100%;border-left:0;border-top:1px solid var(--border);border-radius:24px 24px 0 0;transform:translateY(105%)}.drawer.show{transform:translateY(0)}.bottom-nav{display:flex;position:fixed;left:0;right:0;bottom:0;background:rgba(255,249,240,.94);border-top:1px solid var(--border);padding:9px 16px calc(9px + env(safe-area-inset-bottom));justify-content:space-around;z-index:10}.bottom-nav span{font-size:.78rem;color:var(--muted);font-weight:800}.bottom-nav span.active{color:var(--action)}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">Журка</div>
    <button class="side-btn" onclick="startPlan()">+ Собрать план</button>
    <div class="nav-title">История</div>
    <div class="nav-item active">Последний план</div>
    <div class="nav-item">План от 24 июня</div>
    <div class="nav-item">План от 18 июня</div>
    <div class="nav-title">Сохранённое</div>
    <div class="nav-item">Мои планы</div>
    <div class="nav-item">Корзины</div>
    <div class="nav-item">Настройки</div>
  </aside>
  <main class="main">
    <div class="shell">
      <div class="topbar"><b>Журка</b><span class="muted">Профиль</span></div>
      <div id="view"></div>
    </div>
  </main>
</div>
<div class="sheet-backdrop" id="backdrop" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>
<nav class="bottom-nav"><span class="active">План</span><span>История</span><span>Профиль</span></nav>

<script>
'use strict';
const $=id=>document.getElementById(id);
const H={'Content-Type':'application/json'};
const view=$('view');
let step=0, currentDays=null, currentTarget=null, replaceCtx={}, tempMemory=[], permanentMemory=JSON.parse(localStorage.getItem('zhurka_memory')||'[]');
const state={goal:'',sex:'female',age:'30',height:'165',weight:'60',activity:'moderate',restrictions:'',format:'ready'};
const steps=[
  {title:'Какая сейчас цель?',key:'goal',type:'options',options:[['loss','Похудеть'],['maintain','Поддерживать'],['gain','Набрать'],['unknown','Пока не знаю']]},
  {title:'Базовые данные',type:'fields',fields:[['sex','Пол','select',[['female','Женский'],['male','Мужской']]],['age','Возраст','number']]},
  {title:'Параметры',type:'fields',fields:[['height','Рост, см','number'],['weight','Вес, кг','number']]},
  {title:'Активность и ограничения',type:'mixed'},
  {title:'Как собрать план?',key:'format',type:'options',options:[['ready','Готовые блюда'],['recipes','Рецепты'],['mixed','Смешанный вариант']]}
];
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function renderHome(){
  view.innerHTML=`<section class="hero"><div class="kicker">План питания на неделю</div><h1>Соберём персональный план питания на неделю за пару минут.</h1><p class="lead">Журка задаст несколько простых вопросов и составит недельный план с возможностью собрать корзину на неделю.</p><div class="steps-note"><b>5 коротких шагов</b><br/>цель · данные · параметры · ограничения · формат</div><button class="btn" onclick="startPlan()">Собрать план</button></section>`;
}
function startPlan(){step=0;renderStep();}
function progress(){return `<div class="progress-label">Шаг ${step+1} из ${steps.length}</div><div class="dots">${steps.map((_,i)=>`<span class="dot ${i<=step?'on':''}"></span>`).join('')}</div>`;}
function renderStep(){
  const s=steps[step]; let body='';
  if(s.type==='options') body=`<div class="options">${s.options.map(([v,l])=>`<button class="option ${state[s.key]===v?'selected':''}" onclick="choose('${s.key}','${v}')">${l}</button>`).join('')}</div>`;
  if(s.type==='fields') body=`<div class="fields">${s.fields.map(f=>fieldHtml(f)).join('')}</div><div class="step-actions"><button class="btn" onclick="saveFields()">Продолжить</button>${backBtn()}</div>`;
  if(s.type==='mixed') body=`<div class="fields"><div class="field"><label>Активность</label><select id="activity"><option value="sedentary">Сидячая</option><option value="light">Низкая</option><option value="moderate" selected>Умеренная</option><option value="high">Высокая</option></select></div><div class="field"><label>Что исключить</label><textarea id="restrictions" placeholder="например: свинину, грибы, острое">${esc(state.restrictions)}</textarea></div></div><div class="step-actions"><button class="btn" onclick="saveMixed()">Продолжить</button>${backBtn()}</div>`;
  view.innerHTML=`<section class="card">${progress()}<div class="question">${s.title}</div>${body}${s.type==='options'?`<div class="step-actions">${backBtn()}</div>`:''}</section>`;
  if(s.type==='mixed') $('activity').value=state.activity;
}
function fieldHtml(f){
  const [key,label,type,opts]=f;
  if(type==='select') return `<div class="field"><label>${label}</label><select id="${key}">${opts.map(([v,l])=>`<option value="${v}" ${state[key]===v?'selected':''}>${l}</option>`).join('')}</select></div>`;
  return `<div class="field"><label>${label}</label><input id="${key}" type="${type}" value="${esc(state[key])}"/></div>`;
}
function backBtn(){return step>0?`<button class="btn secondary" onclick="prevStep()">Назад</button>`:'';}
function choose(k,v){state[k]=v; nextStep();}
function saveFields(){steps[step].fields.forEach(f=>state[f[0]]=$(f[0]).value); nextStep();}
function saveMixed(){state.activity=$('activity').value;state.restrictions=$('restrictions').value.trim();nextStep();}
function prevStep(){if(step>0){step--;renderStep();}}
function nextStep(){if(step<steps.length-1){step++;renderStep();}else buildPlan();}
function targetPayload(){return {sex:state.sex,weight:+state.weight,height:+state.height,age:+state.age,activity:state.activity,goal:state.goal==='unknown'?'maintain':state.goal};}
async function buildPlan(){
  renderLoading();
  const wait=new Promise(r=>setTimeout(r,3600));
  try{
    let target;
    try{target=await(await fetch('api/self-serve/kbju',{method:'POST',headers:H,body:JSON.stringify(targetPayload())})).json();}
    catch(e){target={kcal:1750,protein:120,fat:60,carbs:180};}
    currentTarget=target;
    const b={kcal:+target.kcal,protein:+target.protein,fat:+target.fat,carbs:+target.carbs,meal_count:3,restrictions:state.restrictions||null,days_count:7};
    try{const r=await(await fetch('api/self-serve/week',{method:'POST',headers:H,body:JSON.stringify(b)})).json();currentDays=r.days||fallbackDays();}
    catch(e){currentDays=fallbackDays();}
    await wait; renderResult();
  }catch(e){await wait; currentTarget={kcal:1750,protein:120,fat:60,carbs:180}; currentDays=fallbackDays(); renderResult();}
}
function renderLoading(){view.innerHTML=`<section class="card loading"><h2>Журка составляет ваш план...</h2><div class="check-list"><div class="check"><b>✓</b> учитывает цель</div><div class="check"><b>✓</b> подбирает блюда</div><div class="check"><b>✓</b> собирает корзину</div></div></section>`;}
function avgTarget(){return {kcal:Math.round(currentTarget?.kcal||1750),protein:Math.round(currentTarget?.protein||120),fat:Math.round(currentTarget?.fat||60),carbs:Math.round(currentTarget?.carbs||180)};}
function renderResult(){const t=avgTarget();view.innerHTML=`<section class="card result"><h2>План готов</h2><div class="result-grid"><div class="metric"><b>✓ 7 дней</b><span>недельный план</span></div><div class="metric"><b>✓ 21 приём пищи</b><span>завтраки, обеды и ужины</span></div><div class="metric"><span>В среднем за день</span><b>${t.kcal} ккал</b><span>Б ${t.protein} • Ж ${t.fat} • У ${t.carbs}</span></div></div><div class="step-actions"><button class="btn" onclick="makeWeekCart()">Собрать корзину на неделю</button><button class="btn secondary" onclick="renderPlan()">Посмотреть план</button><button class="btn soft" onclick="openWhy()">Почему так?</button></div></section>`;}
function shortDishName(name){return String(name||'Блюдо').replace(/^Комбо-набор:\s*/i,'').replace(/\s+\d+\s*г\b/ig,'').split(',')[0].trim();}
const WD=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
function renderPlan(){
  if(!currentDays) currentDays=fallbackDays();
  view.innerHTML=`<section><div class="day-head" style="margin-bottom:18px"><div><div class="kicker">Недельный план</div><h1 style="font-size:2rem;margin:0">План на неделю</h1></div><button class="btn" onclick="makeWeekCart()">Собрать корзину на неделю</button></div><div class="day-list">${currentDays.map(dayCard).join('')}</div></section>`;
}
function dayCard(day,i){
  return `<article class="day"><div class="day-head"><div class="day-title">${WD[i%7]}</div></div><div class="meal-lines">${(day.meals||[]).map(m=>`<div><b>${esc(m.meal_label)}:</b> ${esc((m.dishes||[]).slice(0,2).map(d=>shortDishName(d.name)).join(' + ')||'подбор блюда')}</div>`).join('')}</div><div class="day-actions"><button class="btn secondary" onclick="openDetails(${i})">Детали</button><button class="btn soft" onclick="openReplaceMeal(${i})">Заменить</button></div></article>`;
}
function openDrawer(html){$('drawer').innerHTML=html;$('backdrop').classList.add('show');$('drawer').classList.add('show');}
function closeDrawer(){$('backdrop').classList.remove('show');$('drawer').classList.remove('show');}
function openDetails(i){
  const day=currentDays[i];
  openDrawer(`<div class="drawer-head"><h2>${WD[i%7]}</h2><button class="x" onclick="closeDrawer()">×</button></div>${(day.meals||[]).map((m,mi)=>`<div class="day" style="box-shadow:none;margin-bottom:12px"><b>${esc(m.meal_label)}</b>${(m.dishes||[]).map(d=>{const n=d.nutrition||{};return `<div class="muted" style="margin-top:8px">${esc(d.name)}<br/>${Math.round(n.calories||0)} ккал</div>`}).join('')}<button class="btn soft" style="margin-top:10px;padding:10px 14px" onclick="openReplaceReason(${i},${mi})">Заменить</button></div>`).join('')}`);
}
function openReplaceMeal(i){
  replaceCtx={dayIdx:i};
  openDrawer(`<div class="drawer-head"><h2>Что хотите заменить?</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="radio-list">${(currentDays[i].meals||[]).map((m,mi)=>`<button class="radio" onclick="openReplaceReason(${i},${mi})">${esc(m.meal_label)}</button>`).join('')}</div>`);
}
function openReplaceReason(dayIdx,mealIdx){
  replaceCtx={dayIdx,mealIdx};
  const reasons=['Не люблю','Аллергия','Слишком дорого','Нет в доставке','Уже готовил недавно','Другое...'];
  openDrawer(`<div class="drawer-head"><h2>Почему?</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="radio-list">${reasons.map(r=>`<button class="radio" onclick="replaceDish('${esc(r)}')">${esc(r)}</button>`).join('')}</div>`);
}
async function replaceDish(reason){
  const {dayIdx,mealIdx}=replaceCtx, day=currentDays[dayIdx], meal=day.meals[mealIdx], old=(meal.dishes||[])[0], n=(old&&old.nutrition)||{};
  tempMemory.push({day:WD[dayIdx%7],meal:meal.meal_label,reason});
  openDrawer(`<div class="drawer-head"><h2>Заменяю...</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка подбирает другой вариант.</p>`);
  try{
    const res=await fetch('api/self-serve/replace-dish',{method:'POST',headers:H,body:JSON.stringify({meal_label:meal.meal_label,meal_type:meal.meal_type||meal.meal_label,kbju:{kcal:n.calories||500,protein:n.protein||30,fat:n.fat||15,carbs:n.carbohydrates||50},restrictions:state.restrictions||null,exclude_xml_ids:(meal.dishes||[]).map(x=>x.xml_id).filter(Boolean)})});
    const data=await res.json(); if(data.dish) meal.dishes[0]=data.dish;
  }catch(e){ meal.dishes[0]={name:'Индейка с булгуром',nutrition:{calories:520,protein:38,fat:16,carbohydrates:54},in_cart:true}; }
  const newName=shortDishName(meal.dishes[0].name);
  openDrawer(`<div class="drawer-head"><h2>Заменили ${meal.meal_label.toLowerCase()}</h2><button class="x" onclick="closeDrawer()">×</button></div><p>Новый вариант: <b>${esc(newName)}</b>.</p><div class="memory-note">Запомнить это для следующих планов?<div class="step-actions"><button class="btn" onclick="saveMemory('${esc(reason)}')">Да, запомнить</button><button class="btn secondary" onclick="closeDrawer();renderPlan()">Только сейчас</button></div></div>`);
}
function saveMemory(reason){permanentMemory.push(reason);localStorage.setItem('zhurka_memory',JSON.stringify(permanentMemory));closeDrawer();renderPlan();}
function openWhy(){openDrawer(`<div class="drawer-head"><h2>Почему так?</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">План собран под вашу цель, распределён на 7 дней и учитывает ограничения${state.restrictions?': '+esc(state.restrictions):'.'}</p>`);}
async function makeWeekCart(){
  if(!currentDays) return;
  openDrawer(`<div class="drawer-head"><h2>Собираю корзину...</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка собирает продукты и готовые блюда на неделю.</p>`);
  try{const r=await(await fetch('api/self-serve/cart',{method:'POST',headers:H,body:JSON.stringify({days:currentDays})})).json();openDrawer(`<div class="drawer-head"><h2>Корзина готова</h2><button class="x" onclick="closeDrawer()">×</button></div>${r.cart_url?`<p class="muted">Товаров: ${r.count}</p><div class="memory-note">${esc(r.cart_url)}</div>`:'<p class="muted">Не удалось собрать корзину. Попробуйте ещё раз.</p>'}`)}
  catch(e){openDrawer(`<div class="drawer-head"><h2>Что-то не получилось</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Попробуйте ещё раз.</p>`)}
}
function fallbackDays(){
  const data=[['Омлет с овощами','Курица + киноа','Паста с лососем'],['Йогурт + ягоды','Индейка + булгур','Боул с тунцом'],['Творог с фруктами','Говядина + рис','Рыба + овощи'],['Каша с орехами','Курица + гречка','Паста с томатами'],['Сырники','Индейка + киноа','Лосось + картофель'],['Омлет','Боул с курицей','Ризотто с грибами'],['Йогурт','Курица + булгур','Паста с креветками']];
