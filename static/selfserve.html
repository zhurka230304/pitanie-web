<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Журка — план на неделю</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#F7F1E7;--surface:#FFFDF8;--ink:#242424;--muted:#6C6A63;--border:#D9C7B4;
    --action:#242424;--plum:#86A9B6;--plum-soft:#E8EEF0;--warm:#D9C7B4;--success:#F4EAD8;
    --danger:#9A3E3E;--disabled:#B8B0A5;--brand:#86A9B6;--brand-dark:#3F5F6B;--r:18px;--shadow:0 18px 46px rgba(63,95,107,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Manrope",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  .app{min-height:100vh}
  .main{padding:22px 24px 70px;display:flex;justify-content:center}
  .shell{width:min(1040px,100%)}
  .app-header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:22px}
  .brand-line{display:flex;align-items:center;gap:10px;border:0;background:transparent;color:inherit;padding:0;text-align:left}
  .brand{font-family:"Cormorant Garamond",Georgia,serif;font-size:1.7rem;font-weight:700;letter-spacing:.01em}
  .brand-subtitle{color:var(--muted);font-size:.88rem;font-weight:700;line-height:1.2;margin-top:1px}
  .bird-logo{width:42px;height:42px;border-radius:50%;background:var(--brand-dark);display:inline-block;box-shadow:0 8px 22px rgba(63,95,107,.16);flex:0 0 auto}
  .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .header-link{border:1px solid var(--border);background:rgba(255,253,248,.62);color:var(--muted);border-radius:999px;padding:9px 13px;font-weight:700}
  .hero{padding:42px;border:1px solid var(--border);border-radius:30px;background:var(--surface);box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kicker{font-size:.76rem;text-transform:uppercase;letter-spacing:.12em;color:var(--brand-dark);font-weight:800;margin-bottom:12px}
  h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(2.45rem,5vw,4.2rem);line-height:.98;letter-spacing:0;font-weight:700;max-width:680px;margin-bottom:14px}
  .lead{font-size:1.05rem;line-height:1.55;color:var(--muted);max-width:620px;margin-bottom:26px}
  .steps-note{border:1px solid var(--border);border-radius:18px;background:rgba(232,238,240,.36);padding:16px 18px;color:var(--muted);line-height:1.45;margin:0 0 22px}.steps-note b{display:block;color:var(--muted);margin-bottom:4px}
  .history-strip{margin-top:18px;border:1px solid var(--border);border-radius:22px;background:rgba(255,253,248,.58);padding:16px;display:flex;gap:10px;align-items:center;justify-content:space-between;color:var(--muted)}
  .history-items{display:flex;gap:8px;flex-wrap:wrap}.history-pill{border:1px solid var(--border);border-radius:999px;padding:7px 10px;background:var(--surface);font-size:.86rem;font-weight:750;color:var(--muted)}
  .auth-card{max-width:620px;margin:auto}.auth-fields{display:grid;gap:10px;margin-top:16px}.auth-tabs{display:flex;gap:8px;margin:16px 0 8px}.auth-tabs button{flex:1}.auth-login{display:block;margin:10px auto 0}.forgot-link{border:0;background:transparent;color:var(--muted);font-weight:800;text-align:center;padding:2px 0 8px}
  .dish-photo{width:72px;height:72px;border-radius:14px;object-fit:cover;background:var(--plum-soft);border:1px solid var(--border);flex:0 0 auto}
  .dish-detail{display:flex;gap:12px;align-items:flex-start;margin-top:12px}
  .dish-link{color:inherit;text-decoration:none}.dish-link:hover b{text-decoration:underline}
  .btn{border:0;background:var(--action);color:#fff;border-radius:999px;padding:15px 22px;font-weight:800;font-size:1rem}
  .btn.secondary{background:transparent;color:var(--action);border:1.5px solid var(--action)}
  .btn.soft{background:var(--plum-soft);color:var(--action)}
  .btn:disabled{opacity:.55;cursor:default}
  .back-mini{border:0;background:transparent;color:var(--muted);font-weight:800;margin-bottom:18px;padding:0}
  .card{border:1px solid var(--border);border-radius:24px;background:var(--surface);box-shadow:var(--shadow);padding:28px}
  .progress-label{font-size:.82rem;color:var(--muted);font-weight:800;margin-bottom:10px}
  .dots{display:flex;gap:8px;margin-bottom:26px}.dot{width:9px;height:9px;border-radius:50%;background:var(--border)}.dot.on{background:var(--plum)}
  .question{font-size:1.75rem;line-height:1.16;font-weight:850;margin-bottom:22px}
  .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .option{border:1.5px solid var(--border);background:#fffdf8;border-radius:16px;padding:16px;text-align:left;font-weight:800;color:var(--ink)}
  .option.selected{border-color:var(--plum);background:var(--plum-soft);color:var(--action)}
  .option span{display:block;color:var(--muted);font-size:.84rem;line-height:1.35;font-weight:650;margin-top:6px}
  .fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .field{display:flex;flex-direction:column;gap:7px}.field label{font-size:.86rem;color:var(--muted);font-weight:750}
  input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:14px;background:#fffdf8;color:var(--ink);padding:13px 14px;outline:0}
  textarea{min-height:92px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(134,169,182,.18)}
  .step-actions{display:flex;gap:10px;margin-top:24px;align-items:center}
  .loading{text-align:left;max-width:520px;margin:auto}.loading h2,.result h2{font-family:"Cormorant Garamond",Georgia,serif;font-size:2.5rem;line-height:1;margin-bottom:18px}
  .spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--brand-dark);animation:spin .9s linear infinite;margin-bottom:18px}@keyframes spin{to{transform:rotate(360deg)}}
  .check-list{display:grid;gap:12px;color:var(--muted);font-weight:700}.check{display:flex;gap:10px;align-items:center}.check b{color:#5D4326}
  .result{background:var(--success)}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:20px 0}
  .metric{background:rgba(255,255,255,.52);border:1px solid rgba(93,67,38,.12);border-radius:18px;padding:16px}
  .metric b{display:block;font-size:1.45rem;margin-bottom:4px}.metric span{color:var(--muted);font-size:.9rem;font-weight:700}
  .cabinet-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(280px,.75fr);gap:18px;align-items:start}
  .cabinet-main{display:grid;gap:18px}.cabinet-side{display:grid;gap:10px}.cabinet-week{grid-column:1/-1}
  .cabinet-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:2.4rem;line-height:1;margin-bottom:8px}.mini-plan{display:grid;gap:10px;margin-top:14px}
  .day-list{display:grid;gap:14px}.day{border:1px solid var(--border);border-radius:20px;background:var(--surface);padding:18px}
  .day-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.day-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:1.55rem;font-weight:700}.day-title-button{border:0;background:transparent;color:inherit;font:inherit;font-weight:inherit;padding:0;text-align:left}.day-title-button:hover{text-decoration:underline}.day-kbju{display:block;font-family:"Manrope",system-ui,sans-serif;font-size:.84rem;line-height:1.35;color:var(--muted);font-weight:800;margin-top:3px}
  .meal-lines{line-height:1.8;color:var(--ink)}.meal-lines b{color:var(--action)}
  .day-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.day-actions .btn{padding:10px 14px;font-size:.9rem}
  .sheet-backdrop{position:fixed;inset:0;background:rgba(31,30,28,.32);display:none;z-index:20}.sheet-backdrop.show{display:block}
  .drawer{position:fixed;right:0;top:0;height:100vh;width:min(430px,100%);background:var(--surface);border-left:1px solid var(--border);box-shadow:0 20px 60px rgba(31,30,28,.18);padding:24px;transform:translateX(105%);transition:.22s;z-index:30;overflow:auto}
  .drawer.show{transform:translateX(0)}.drawer-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.x{border:0;background:transparent;font-size:1.6rem;color:var(--muted)}
  .radio-list{display:grid;gap:10px}.radio{border:1.5px solid var(--border);border-radius:14px;padding:14px;background:#fffdf8;font-weight:800;text-align:left}.radio.selected{background:var(--plum-soft);border-color:var(--plum)}
  .memory-note{border:1px solid var(--border);border-radius:16px;background:#fffdf8;padding:14px;margin-top:16px;color:var(--muted);line-height:1.45}
  .memory-button{width:100%;text-align:left;cursor:pointer}
  .bottom-nav{display:none}.bottom-nav button{border:0;background:transparent;color:var(--muted);font-weight:800}
  .muted{color:var(--muted)}
  @media(max-width:780px){
    .main{padding:12px 12px 84px}.shell{width:100%}.app-header{padding:8px 4px 4px;margin-bottom:12px}.brand{font-size:1.22rem}.brand-subtitle{font-size:.68rem;max-width:190px}.bird-logo{width:36px;height:36px}.header-link{display:none}.hero{padding:24px 20px;border-radius:24px;box-shadow:none}h1{font-size:2.35rem}.lead{font-size:.98rem}.history-strip{display:none}.card{padding:22px;border-radius:22px;box-shadow:none}.options,.fields,.result-grid,.cabinet-grid{grid-template-columns:1fr}.question{font-size:1.45rem}.step-actions{flex-direction:column}.step-actions .btn{width:100%}.drawer{top:auto;bottom:0;height:min(82vh,680px);width:100%;border-left:0;border-top:1px solid var(--border);border-radius:24px 24px 0 0;transform:translateY(105%)}.drawer.show{transform:translateY(0)}.bottom-nav{display:flex;position:fixed;left:0;right:0;bottom:0;background:rgba(255,253,248,.94);border-top:1px solid var(--border);padding:9px 16px calc(9px + env(safe-area-inset-bottom));justify-content:space-around;z-index:10}.bottom-nav button{font-size:.78rem;padding:8px 14px}.bottom-nav button.active{color:var(--action)}
  }
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <div class="shell">
      <header class="app-header">
        <button class="brand-line" onclick="renderHome()" aria-label="На главную"><span class="bird-logo" aria-hidden="true"></span><div><div class="brand">Журка</div><div class="brand-subtitle">Перестаньте думать, что съесть</div></div></button>
        <div class="header-actions">
          <button class="header-link" onclick="openCabinetPlans()">История планов</button>
          <button class="header-link" onclick="openCabinet()">Личный кабинет</button>
        </div>
      </header>
      <div id="view"></div>
    </div>
  </main>
</div>
<div class="sheet-backdrop" id="backdrop" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>
<nav class="bottom-nav"><button class="active" onclick="renderHome()">Питание</button><button onclick="openCabinetPlans()">История</button><button onclick="openCabinet()">Личный кабинет</button></nav>

<script>
'use strict';
const $=id=>document.getElementById(id);
const H={'Content-Type':'application/json'};
const view=$('view');
let step=0, currentDays=null, currentTarget=null, currentPlanTitle='План на неделю', currentBack='renderResult()', nextWeekDays=null, nextWeekTarget=null, replaceCtx={}, tempMemory=[], permanentMemory=JSON.parse(localStorage.getItem('zhurka_memory')||'[]');
let authToken=localStorage.getItem('zhurka_token')||'', authName=localStorage.getItem('zhurka_name')||'', authEmail=localStorage.getItem('zhurka_email')||'';
const state={goal:'',sex:'female',age:'30',height:'165',weight:'60',activity:'',restrictions:'',format:''};
const ACTIVITY=[
  ['sedentary','Сидячая','Работа за компьютером, мало ходьбы, без регулярных тренировок'],
  ['light','Низкая','Много бытовой ходьбы или лёгкие тренировки 1–2 раза в неделю'],
  ['moderate','Умеренная','Тренировки 3–4 раза в неделю или активный день на ногах'],
  ['high','Высокая','Интенсивные тренировки 5+ раз в неделю или физическая работа']
];
const steps=[
  {title:'Какая сейчас цель?',key:'goal',type:'options',options:[['loss','Похудеть'],['maintain','Поддерживать'],['gain','Набрать'],['unknown','Пока не знаю']]},
  {title:'Базовые данные',type:'fields',fields:[['sex','Пол','select',[['female','Женский'],['male','Мужской']]],['age','Возраст','number']]},
  {title:'Параметры',type:'fields',fields:[['height','Рост, см','number'],['weight','Вес, кг','number']]},
  {title:'Активность и ограничения',type:'mixed'},
  {title:'Как собрать план?',key:'format',type:'options',options:[['ready','Готовые блюда'],['recipes','Рецепты'],['mixed','Смешанный вариант']]}
];
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function setScreen(name){localStorage.setItem('zhurka_screen',name);}
function profileData(){return {goal:state.goal,sex:state.sex,age:state.age,height:state.height,weight:state.weight,activity:state.activity,restrictions:state.restrictions,format:state.format};}
async function saveProfileData(){
  if(!authToken) return;
  try{await fetch('api/self-serve/profile/save',{method:'POST',headers:H,body:JSON.stringify({token:authToken,tg_user:{},data:profileData()})});}catch(e){}
}
async function loadRemoteProfile(){
  if(!authToken) return;
  try{
    const r=await fetch('api/self-serve/profile/get',{method:'POST',headers:H,body:JSON.stringify({token:authToken,tg_user:{}})});
    const d=await r.json();
    if(d.name){authName=d.name;localStorage.setItem('zhurka_name',authName);}
    if(d.email){authEmail=d.email;localStorage.setItem('zhurka_email',authEmail);}
    if(d.profile&&typeof d.profile==='object'){Object.assign(state,d.profile);localStorage.setItem('zhurka_state',JSON.stringify(state));}
  }catch(e){}
}
function saveActivePlan(){if(currentDays&&currentTarget)localStorage.setItem('zhurka_active_plan',JSON.stringify({days:currentDays,target:currentTarget,title:currentPlanTitle,back:currentBack}));}
function loadActivePlan(){try{const p=JSON.parse(localStorage.getItem('zhurka_active_plan')||'null');if(p?.days){currentDays=p.days;currentTarget=p.target;currentPlanTitle=p.title||'План на неделю';currentBack=p.back||'renderResult()';}}catch(e){}}
function saveNextWeek(){
  if(!nextWeekDays||!nextWeekTarget) return;
  const entry={id:Date.now(),title:new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'long'}),created_at:new Date().toISOString(),target:nextWeekTarget,days:nextWeekDays,format:state.format};
  const history=nextWeekPlans();
  history.unshift(entry);
  saveNextWeekCurrent();
  localStorage.setItem('zhurka_next_week_plans',JSON.stringify(history.slice(0,8)));
}
function saveNextWeekCurrent(){
  if(!nextWeekDays||!nextWeekTarget) return;
  localStorage.setItem('zhurka_next_week',JSON.stringify({days:nextWeekDays,target:nextWeekTarget}));
}
function loadNextWeek(){try{const p=JSON.parse(localStorage.getItem('zhurka_next_week')||'null');if(p?.days){nextWeekDays=p.days;nextWeekTarget=p.target;}}catch(e){}}
function nextWeekPlans(){try{return JSON.parse(localStorage.getItem('zhurka_next_week_plans')||'[]')}catch(e){return []}}
function renderHome(){
  setScreen('home');
  view.innerHTML=`<section class="hero"><div class="kicker">Персональный план</div><h1>Соберём питание на неделю за пару минут</h1><p class="lead">Ответьте на несколько вопросов — Журка подберёт питание и подготовит корзину</p><div class="steps-note"><b>Как это работает</b>Журка задаст несколько простых вопросов и соберёт план на неделю с возможностью сразу сделать заказ</div><button class="btn" onclick="startPlan()">Подобрать питание</button></section>`;
}
function savedPlans(){try{return JSON.parse(localStorage.getItem('zhurka_plans')||'[]')}catch(e){return []}}
function historyHtml(){
  const plans=savedPlans();
  if(!plans.length) return `<section class="history-strip" id="historyStrip"><div><b>История</b><br/><span>Здесь появятся планы, которые вы сохраните после сборки</span></div><div class="history-items"><span class="history-pill">Пока пусто</span></div></section>`;
  return `<section class="history-strip" id="historyStrip"><div><b>История</b><br/><span>${authToken?'Синхронизируются в профиле':'Сохранены в этом браузере'}</span></div><div class="history-items">${plans.slice(0,4).map((p,i)=>`<button class="history-pill" onclick="openSavedPlan(${i})">${esc(historyTitle(p))}</button>`).join('')}</div></section>`;
}
function historyTitle(p){return String(p?.title||'').replace(/^План от\s+/,'')||'Без даты';}
function formatLabel(v){return ({ready:'Готовые блюда',recipes:'Рецепты',mixed:'Смешанный вариант'}[v]||'Готовые блюда');}
function historyMeta(p){
  const time=p?.created_at?new Date(p.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):'';
  const kcal=p?.target?.kcal?`${Math.round(p.target.kcal)} ккал`:'ккал не указаны';
  const macro=p?.target?`Б ${Math.round(p.target.protein||0)} • Ж ${Math.round(p.target.fat||0)} • У ${Math.round(p.target.carbs||p.target.carbohydrates||0)}`:'';
  return [time,kcal,macro,formatLabel(p?.format)].filter(Boolean).join(' • ');
}
function openSavedPlan(i){const p=savedPlans()[i]; if(!p)return; currentDays=p.days; currentTarget=p.target; currentPlanTitle='План на неделю'; currentBack='renderCabinetPage()'; saveActivePlan(); renderPlan();}
function startPlan(){step=0;renderStep();}
function progress(){return `<div class="progress-label">Шаг ${step+1} из ${steps.length}</div><div class="dots">${steps.map((_,i)=>`<span class="dot ${i<=step?'on':''}"></span>`).join('')}</div>`;}
function renderStep(){
  setScreen('step');
  localStorage.setItem('zhurka_step',String(step));
  localStorage.setItem('zhurka_state',JSON.stringify(state));
  const s=steps[step]; let body='';
  if(s.type==='options') body=`<div class="options">${s.options.map(([v,l])=>`<button class="option ${state[s.key]===v?'selected':''}" onclick="choose('${s.key}','${v}')">${l}</button>`).join('')}</div>`;
  if(s.type==='fields') body=`<div class="fields">${s.fields.map(f=>fieldHtml(f)).join('')}</div><div class="step-actions"><button class="btn" onclick="saveFields()">Продолжить</button>${backBtn()}</div>`;
  if(s.type==='mixed') body=`<div class="fields"><div class="field"><label>Активность</label><div class="options" style="grid-template-columns:1fr">${ACTIVITY.map(([v,l,d])=>`<button class="option ${state.activity===v?'selected':''}" onclick="chooseActivity('${v}')">${l}<span>${d}</span></button>`).join('')}</div></div><div class="field"><label>Что исключить</label><textarea id="restrictions" placeholder="например: свинину, грибы, острое">${esc(state.restrictions)}</textarea></div></div><div class="step-actions"><button class="btn" onclick="saveMixed()">Продолжить</button>${backBtn()}</div>`;
  view.innerHTML=`<section class="card">${progress()}<div class="question">${s.title}</div>${body}${s.type==='options'?`<div class="step-actions">${backBtn()}</div>`:''}</section>`;
}
function fieldHtml(f){
  const [key,label,type,opts]=f;
  if(type==='select') return `<div class="field"><label>${label}</label><select id="${key}">${opts.map(([v,l])=>`<option value="${v}" ${state[key]===v?'selected':''}>${l}</option>`).join('')}</select></div>`;
  return `<div class="field"><label>${label}</label><input id="${key}" type="${type}" value="${esc(state[key])}"/></div>`;
}
function backBtn(){return `<button class="btn secondary" onclick="${step>0?'prevStep()':'renderHome()'}">Назад</button>`;}
function choose(k,v){state[k]=v; nextStep();}
function chooseActivity(v){state.activity=v;renderStep();}
function saveFields(){steps[step].fields.forEach(f=>state[f[0]]=$(f[0]).value); nextStep();}
function saveMixed(){if(!state.activity){alert('Выберите активность');return;}state.restrictions=$('restrictions').value.trim();nextStep();}
function prevStep(){if(step>0){step--;renderStep();}}
function nextStep(){if(step<steps.length-1){step++;renderStep();}else authToken?buildPlan():renderAuthChoice();}
function renderAuthChoice(){
  setScreen('auth');
  view.innerHTML=`<section class="card auth-card"><button class="back-mini" onclick="step=steps.length-1;renderStep()">Назад</button><h2 style="font-size:2rem;margin-bottom:10px">Продолжить как гость или создать профиль?</h2><p class="lead" style="margin-bottom:0">Можно создать профиль, чтобы планы сохранялись в личном кабинете, или продолжить без регистрации, в этом случае история сохранится только в этом браузере</p><div class="auth-tabs"><button class="btn" onclick="showAuthForm('register')">Создать профиль</button><button class="btn secondary" onclick="buildPlan()">Продолжить как гость</button></div><button class="btn soft auth-login" onclick="showAuthForm('login')">Уже есть аккаунт</button><div id="authArea"></div></section>`;
}
function showAuthForm(kind){

function nutritionOf(d){
  const n=d?.nutrition||d||{};
  return {
    kcal:+(n.calories||n.kcal||n.calorie||n.energy||0),
    protein:+(n.protein||n.proteins||n.protein_g||n.proteinGram||0),

    carbs:+(n.carbohydrates||n.carbohydrate||n.carbs||n.carb||n.carbs_g||n.carbohydrates_g||n.carbGram||0)
  };
}
function dayTotals(day){
  return (day?.meals||[]).flatMap(m=>m.dishes||[]).reduce((a,d)=>{const n=nutritionOf(d);a.kcal+=n.kcal;a.protein+=n.protein;a.fat+=n.fat;a.carbs+=n.carbs;return a;},{kcal:0,protein:0,fat:0,carbs:0});

}
function kbjuText(n){return `${Math.round(n.kcal)} ккал · Б ${Math.round(n.protein)} · Ж ${Math.round(n.fat)} · У ${Math.round(n.carbs)}`;}
function humanPortion(raw){
  if(raw===undefined||raw===null||raw==='') return '';
  const text=String(raw).trim();
  if(/[а-яa-z%]/i.test(text)&&!/^(\d+[.,]?\d*)$/.test(text)) return `Съесть: ${esc(text)}`;
  const num=Number(text.replace(',','.'));
  if(!Number.isFinite(num)) return `Съесть: ${esc(text)}`;
  if(num>10) return `Съесть: ${Math.round(num)} г`;
  if(Math.abs(num-1)<.03) return 'Съесть всю порцию';
  const variants=[[.25,'1/4 порции'],[.33,'1/3 порции'],[.5,'1/2 порции'],[.67,'2/3 порции'],[.75,'3/4 порции'],[1.25,'1 1/4 порции'],[1.5,'1 1/2 порции']];
  const found=variants.find(([v])=>Math.abs(num-v)<.04);
  if(found) return `Съесть ${found[1]}`;
  return `Съесть ${String(Math.round(num*100)/100).replace('.',',')} порции`;
}
function portionText(d){
  const pieces=String(d?.name||'').match(/(\d+)\s*(?:шт|штук|штуки|штука)\b/i);
  if(pieces){
    const portion=Number(String(d?.portion??d?.serving??1).replace(',','.'));
    const count=Math.max(1,Math.round(+pieces[1]*(Number.isFinite(portion)?portion:1)));
    return `Съесть ${count} ${pieceWord(count)}`;
  }
  const label=d?.portion_label||d?.portion_hint||d?.serving_text;
  if(label) return `Съесть: ${esc(label)}`;
  const raw=d?.portion??d?.serving??d?.portion_text??d?.amount??d?.quantity;
  const portion=humanPortion(raw);
  if(portion) return portion;
  const weight=d?.weight||d?.grams;
  if(weight) return `Съесть всю порцию: ${esc(weight)} г`;
  const grams=String(d?.name||'').match(/(\d+)\s*г\b/i);
  return grams?`Съесть всю порцию: ${grams[1]} г`:'Съесть всю порцию';
}
function pieceWord(n){
  const mod10=n%10, mod100=n%100;
  if(mod10===1&&mod100!==11) return 'штуку';
  if(mod10>=2&&mod10<=4&&(mod100<12||mod100>14)) return 'штуки';
  return 'штук';
}

  await wait;
  saveNextWeek();
  renderNextWeekSummary();
}
function makeSavedWeekCart(i){const p=savedPlans()[i]; if(!p)return; currentDays=p.days; currentTarget=p.target; makeWeekCart();}
function openCabinetPlans(){
  const plans=savedPlans();
  const next=nextWeekPlans();
  const list=(items,handler)=>items.length?`<div class="radio-list">${items.map((p,i)=>`<button class="radio" onclick="closeDrawer();${handler}(${i})">${esc(historyTitle(p))}<span style="display:block;color:var(--muted);font-size:.84rem;margin-top:4px">${esc(historyMeta(p))}</span></button>`).join('')}</div>`:'<p class="muted">Пока пусто</p>';
  openDrawer(`<div class="drawer-head"><h2>История</h2><button class="x" onclick="closeDrawer()">×</button></div><h3 style="margin:8px 0 10px">Питание на текущую неделю</h3>${list(plans,'openSavedPlan')}<h3 style="margin:22px 0 10px">Питание на следующую неделю</h3>${list(next,'openNextWeekSaved')}`);
}
function showCabinetAuthForm(kind){
  openDrawer(`<div class="drawer-head"><h2>${kind==='register'?'Создать профиль':'Войти'}</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="auth-fields">${kind==='register'?'<input id="authName" placeholder="Имя"/>':''}<input id="authEmail" type="email" placeholder="Почта"/><input id="authPass" type="password" placeholder="Пароль"/>${kind==='login'?'<button class="forgot-link" onclick="forgotPassword()">Не помню пароль</button>':''}<button class="btn" onclick="profileAuth('${kind}')">${kind==='register'?'Создать профиль':'Войти'}</button></div><button class="back-mini" style="margin-top:16px" onclick="openCabinet()">Назад</button>`);
}
async function profileAuth(kind){
  const email=$('authEmail').value.trim(), password=$('authPass').value, name=$('authName')?$('authName').value.trim():'';
  if(!email||!password){alert('Введите почту и пароль');return;}
  try{
    const r=await fetch('api/self-serve/'+kind,{method:'POST',headers:H,body:JSON.stringify({email,password,name})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Не удалось войти');
    authToken=d.token; authName=d.name||email; authEmail=d.email||email; localStorage.setItem('zhurka_token',authToken); localStorage.setItem('zhurka_name',authName); localStorage.setItem('zhurka_email',authEmail);
    closeDrawer(); renderCabinetPage();
  }catch(e){alert(e.message||'Не удалось войти');}
}
function openDetails(i){
  const day=currentDays[i];
  const total=dayTotals(day);
  openDrawer(`<div class="drawer-head"><div><h2>${dayLabel(i)}</h2><span class="day-kbju">${kbjuText(total)}</span></div><button class="x" onclick="closeDrawer()">×</button></div>${(day.meals||[]).map((m,mi)=>`<div class="day" style="box-shadow:none;margin-bottom:12px"><b>${esc(m.meal_label)}</b><span class="day-kbju">${kbjuText(mealTotals(m))}</span>${(m.dishes||[]).map(d=>dishDetailHtml(d)).join('')}<div class="day-actions"><button class="btn soft" style="padding:10px 14px" onclick="openReplaceReason(${i},${mi})">Заменить</button><button class="btn secondary" style="padding:10px 14px" onclick="orderMeal(${i},${mi})">Заказать ${esc(String(m.meal_label||'приём').toLowerCase())}</button></div></div>`).join('')}`);
}
function openInBody(){
  openDrawer(`<div class="drawer-head"><h2>Отчёт InBody</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Загрузите отчёт InBody, чтобы Журка точнее оценила состав тела и уточнила дневные калории</p><div class="auth-fields"><input type="file" accept=".pdf,image/*"/><button class="btn" onclick="showInBodySuccess()">Загрузить отчёт</button></div><p class="muted" style="margin-top:14px">Пока это заготовка сценария: после подключения обработки отчёта калории будут пересчитаны автоматически</p>`);
}
function showInBodySuccess(){
  openDrawer(`<div class="drawer-head"><h2>Отчёт загружен</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка учтёт данные InBody при следующем расчёте калорий</p><div class="memory-note">Можно сразу подобрать новое питание с уточнёнными параметрами</div><div class="step-actions"><button class="btn" onclick="closeDrawer();startPlan()">Подобрать новое питание</button><button class="btn secondary" onclick="closeDrawer()">Остаться здесь</button></div>`);
}
function dishDetailHtml(d){
  const n=nutritionOf(d), img=d.image_url?`<img class="dish-photo" src="${esc(d.image_url)}" alt="">`:`<div class="dish-photo"></div>`;
  const price=d.price?` · ${d.price} ₽`:'';
  const href=d.url?esc(d.url):'';
  const photo=href?`<a class="dish-link" href="${href}" target="_blank" rel="noopener">${img}</a>`:img;
  const name=href?`<a class="dish-link" href="${href}" target="_blank" rel="noopener"><b style="color:var(--ink)">${esc(d.name)}</b></a>`:`<b style="color:var(--ink)">${esc(d.name)}</b>`;
  return `<div class="dish-detail">${photo}<div class="muted">${name}<br/>${Math.round(n.kcal)} ккал${price}<br/>Б ${Math.round(n.protein)} · Ж ${Math.round(n.fat)} · У ${Math.round(n.carbs)}<br/>${portionText(d)}</div></div>`;
}
function openReplaceMeal(i){
  replaceCtx={dayIdx:i};
  openDrawer(`<div class="drawer-head"><h2>Что хотите заменить?</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="radio-list">${(currentDays[i].meals||[]).map((m,mi)=>`<button class="radio" onclick="openReplaceReason(${i},${mi})">${esc(m.meal_label)}</button>`).join('')}</div>`);
}
function openReplaceReason(dayIdx,mealIdx){
  replaceCtx={dayIdx,mealIdx};
  const reasons=['Не люблю','Аллергия','Слишком дорого','Нет в наличии','Блюдо не найдено (техническая неполадка)','Другое'];
  openDrawer(`<div class="drawer-head"><h2>Почему?</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="radio-list">${reasons.map(r=>`<button class="radio" onclick="replaceDish('${esc(r)}')">${esc(r)}</button>`).join('')}</div>`);
}
function memoryText(reason, mealLabel, oldName){
  const meal=String(mealLabel||'это блюдо').toLowerCase();
  const dish=shortDishName(oldName||meal);
  const map={
    'Не люблю':`Не предлагать похожий ${meal}: ${dish}`,
    'Аллергия':`Исключать похожие блюда из-за аллергии: ${dish}`,
    'Слишком дорого':`Подбирать ${meal} дешевле, чем ${dish}`,
    'Нет в наличии':`Не предлагать блюда, которых нет в наличии: ${dish}`,
    'Блюдо не найдено (техническая неполадка)':`Если блюдо не найдено, подбирать похожий ${meal}: ${dish}`,
    'Другое':`Учитывать, что этот ${meal} не подошёл: ${dish}`
  };
  return map[reason]||map['Другое'];
}
async function replaceDish(reason){
  const {dayIdx,mealIdx}=replaceCtx, day=currentDays[dayIdx], meal=day.meals[mealIdx], old=(meal.dishes||[])[0], n=(old&&old.nutrition)||{};
  tempMemory.push({day:dayLabel(dayIdx),meal:meal.meal_label,reason});
  openDrawer(`<div class="drawer-head"><h2>Заменяю</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка подбирает другой вариант</p>`);
  try{
    const res=await fetch('api/self-serve/replace-dish',{method:'POST',headers:H,body:JSON.stringify({meal_label:meal.meal_label,meal_type:meal.meal_type||meal.meal_label,kbju:{kcal:n.calories||500,protein:n.protein||30,fat:n.fat||15,carbs:n.carbohydrates||50},restrictions:state.restrictions||null,exclude_xml_ids:(meal.dishes||[]).map(x=>x.xml_id).filter(Boolean)})});
    const data=await res.json(); if(data.dish) meal.dishes[0]=data.dish;
  }catch(e){ meal.dishes[0]={name:'Индейка с булгуром',nutrition:{calories:520,protein:38,fat:16,carbohydrates:54},in_cart:true}; }
  const newName=shortDishName(meal.dishes[0].name);
  const memory=memoryText(reason,meal.meal_label,old?.name);
  openDrawer(`<div class="drawer-head"><h2>Заменили ${meal.meal_label.toLowerCase()}</h2><button class="x" onclick="closeDrawer()">×</button></div><p>Новый вариант: <b>${esc(newName)}</b></p><div class="memory-note"><b style="color:var(--ink)">Что запомнить?</b><br/>${esc(memory)}<div class="step-actions"><button class="btn" onclick="saveMemory('${esc(memory)}')">Да, запомнить</button><button class="btn secondary" onclick="closeDrawer();renderPlan()">Только сейчас</button></div></div>`);
}
function saveMemory(reason){permanentMemory.push(reason);localStorage.setItem('zhurka_memory',JSON.stringify(permanentMemory));closeDrawer();renderPlan();}
async function makeWeekCart(){
  if(!currentDays) return;
  openDrawer(`<div class="drawer-head"><h2>Собираю корзину</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка собирает продукты и готовые блюда на неделю</p>`);
  try{const r=await(await fetch('api/self-serve/cart',{method:'POST',headers:H,body:JSON.stringify({days:currentDays})})).json();openDrawer(`<div class="drawer-head"><h2>Корзина готова</h2><button class="x" onclick="closeDrawer()">×</button></div>${r.cart_url?`<p class="muted">Товаров: ${r.count}</p><div class="memory-note">${esc(r.cart_url)}</div>`:'<p class="muted">Не удалось собрать корзину, попробуйте ещё раз</p>'}`)}
  catch(e){openDrawer(`<div class="drawer-head"><h2>Что-то не получилось</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Попробуйте ещё раз</p>`)}
}
async function orderMeal(dayIdx,mealIdx){
  const meal=currentDays?.[dayIdx]?.meals?.[mealIdx];
  if(!meal) return;
  const xml_ids=(meal.dishes||[]).filter(d=>d.in_cart!==false).map(d=>d.xml_id).filter(Boolean);
  openDrawer(`<div class="drawer-head"><h2>Собираю ${esc(String(meal.meal_label||'приём').toLowerCase())}</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка добавляет товары выбранного приёма</p>`);
  try{
    const r=await(await fetch('api/self-serve/cart',{method:'POST',headers:H,body:JSON.stringify({xml_ids})})).json();
    openDrawer(`<div class="drawer-head"><h2>Корзина готова</h2><button class="x" onclick="closeDrawer()">×</button></div>${r.cart_url?`<p class="muted">Товаров: ${r.count}</p><div class="memory-note">${esc(r.cart_url)}</div>`:'<p class="muted">Не удалось собрать корзину, попробуйте ещё раз</p>'}`);
  }catch(e){openDrawer(`<div class="drawer-head"><h2>Что-то не получилось</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Попробуйте ещё раз</p>`)}
}
function fallbackDays(){
  const data=[['Омлет с овощами','Курица + киноа','Паста с лососем'],['Йогурт + ягоды','Индейка + булгур','Боул с тунцом'],['Творог с фруктами','Говядина + рис','Рыба + овощи'],['Каша с орехами','Курица + гречка','Паста с томатами'],['Сырники','Индейка + киноа','Лосось + картофель'],['Омлет','Боул с курицей','Ризотто с грибами'],['Йогурт','Курица + булгур','Паста с креветками']];
  return data.map((d,idx)=>({plan_date:String(idx),meals:['Завтрак','Обед','Ужин'].map((label,i)=>({meal_label:label,meal_type:label,dishes:[{name:d[i],nutrition:{calories:[420,650,680][i],protein:[25,45,38][i],fat:[18,20,26][i],carbohydrates:[35,70,78][i]},in_cart:true}]}))}));
}
function renderResetPassword(token){
  view.innerHTML=`<section class="card auth-card"><h2 style="font-size:2rem;margin-bottom:10px">Новый пароль</h2><p class="lead" style="margin-bottom:0">Придумайте новый пароль для входа в Журку</p><div class="auth-fields"><input id="newPass" type="password" placeholder="Новый пароль"/><button class="btn" onclick="resetPassword('${esc(token)}')">Сохранить пароль</button></div></section>`;
}
async function resetPassword(token){
  const password=$('newPass').value;
  if(!password||password.length<6){alert('Пароль не короче 6 символов');return;}
  try{
    const r=await fetch('api/self-serve/reset-password',{method:'POST',headers:H,body:JSON.stringify({token,password})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Не удалось сохранить пароль');
    history.replaceState({},'',location.pathname);
    alert('Пароль обновлён');
    renderAuthChoice();
    showAuthForm('login');
  }catch(e){alert(e.message||'Не удалось сохранить пароль');}
}
function restoreState(){
  try{
    const saved=JSON.parse(localStorage.getItem('zhurka_state')||'null');
    if(saved&&typeof saved==='object') Object.assign(state,saved);
  }catch(e){}
  const savedStep=Number(localStorage.getItem('zhurka_step'));
  if(Number.isFinite(savedStep)) step=Math.max(0,Math.min(steps.length-1,savedStep));
  loadActivePlan();
  loadNextWeek();
}
async function boot(){
  restoreState();
  const token=new URLSearchParams(location.search).get('reset_token');
  if(token){renderResetPassword(token);return;}
  if(authToken) await loadRemoteProfile();
  const screen=localStorage.getItem('zhurka_screen')||'home';
  if(screen==='step') return renderStep();
  if(screen==='auth') return renderAuthChoice();
  if(screen==='result'&&currentDays) return renderResult();
  if(screen==='plan'&&currentDays) return renderPlan();
  if(screen==='cabinet') return renderCabinetPage();
  if(screen==='next-week'&&nextWeekDays) return renderNextWeekSummary();
  if(screen==='loading') return currentDays?renderResult():renderLoading();
  renderHome();
}
boot();
</script>
</body>
