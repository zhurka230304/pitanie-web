<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Журка — план на неделю</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#F7F1E7;--surface:#FFFDF8;--ink:#242424;--muted:#6C6A63;--border:#D9C7B4;
    --action:#242424;--plum:#86A9B6;--plum-soft:#E8EEF0;--warm:#D9C7B4;--success:#F4EAD8;
    --danger:#9A3E3E;--disabled:#B8B0A5;--brand:#86A9B6;--brand-dark:#3F5F6B;--r:18px;--shadow:0 18px 46px rgba(63,95,107,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Manrope",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  .app{min-height:100vh}
  .main{padding:22px 24px 70px;display:flex;justify-content:center}
  .shell{width:min(1040px,100%)}
  .app-header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:22px}
  .brand-line{display:flex;align-items:center;gap:10px;border:0;background:transparent;color:inherit;padding:0;text-align:left}
  .brand{font-family:"Cormorant Garamond",Georgia,serif;font-size:1.7rem;font-weight:700;letter-spacing:.01em}
  .bird-logo{width:42px;height:42px;border-radius:50%;background:var(--brand-dark);display:inline-block;box-shadow:0 8px 22px rgba(63,95,107,.16);flex:0 0 auto}
  .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .header-link{border:1px solid var(--border);background:rgba(255,253,248,.62);color:var(--muted);border-radius:999px;padding:9px 13px;font-weight:700}
  .hero{padding:42px;border:1px solid var(--border);border-radius:30px;background:var(--surface);box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kicker{font-size:.76rem;text-transform:uppercase;letter-spacing:.12em;color:var(--brand-dark);font-weight:800;margin-bottom:12px}
  h1{font-family:"Cormorant Garamond",Georgia,serif;font-size:clamp(2.45rem,5vw,4.2rem);line-height:.98;letter-spacing:0;font-weight:700;max-width:680px;margin-bottom:14px}
  .lead{font-size:1.05rem;line-height:1.55;color:var(--muted);max-width:620px;margin-bottom:26px}
  .steps-note{border:1px solid var(--border);border-radius:18px;background:rgba(232,238,240,.5);padding:14px 16px;color:var(--muted);line-height:1.5;margin-bottom:20px}
  .history-strip{margin-top:18px;border:1px solid var(--border);border-radius:22px;background:rgba(255,253,248,.58);padding:16px;display:flex;gap:10px;align-items:center;justify-content:space-between;color:var(--muted)}
  .history-items{display:flex;gap:8px;flex-wrap:wrap}.history-pill{border:1px solid var(--border);border-radius:999px;padding:7px 10px;background:var(--surface);font-size:.86rem;font-weight:750;color:var(--muted)}
  .auth-card{max-width:620px;margin:auto}.auth-fields{display:grid;gap:10px;margin-top:16px}.auth-tabs{display:flex;gap:8px;margin:16px 0 8px}.auth-tabs button{flex:1}
  .dish-photo{width:72px;height:72px;border-radius:14px;object-fit:cover;background:var(--plum-soft);border:1px solid var(--border);flex:0 0 auto}
  .dish-detail{display:flex;gap:12px;align-items:flex-start;margin-top:12px}
  .btn{border:0;background:var(--action);color:#fff;border-radius:999px;padding:15px 22px;font-weight:800;font-size:1rem}
  .btn.secondary{background:transparent;color:var(--action);border:1.5px solid var(--action)}
  .btn.soft{background:var(--plum-soft);color:var(--action)}
  .btn:disabled{opacity:.55;cursor:default}
  .back-mini{border:0;background:transparent;color:var(--muted);font-weight:800;margin-bottom:18px;padding:0}
  .card{border:1px solid var(--border);border-radius:24px;background:var(--surface);box-shadow:var(--shadow);padding:28px}
  .progress-label{font-size:.82rem;color:var(--muted);font-weight:800;margin-bottom:10px}
  .dots{display:flex;gap:8px;margin-bottom:26px}.dot{width:9px;height:9px;border-radius:50%;background:var(--border)}.dot.on{background:var(--plum)}
  .question{font-size:1.75rem;line-height:1.16;font-weight:850;margin-bottom:22px}
  .options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .option{border:1.5px solid var(--border);background:#fffdf8;border-radius:16px;padding:16px;text-align:left;font-weight:800;color:var(--ink)}
  .option.selected{border-color:var(--plum);background:var(--plum-soft);color:var(--action)}
  .fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .field{display:flex;flex-direction:column;gap:7px}.field label{font-size:.86rem;color:var(--muted);font-weight:750}
  input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:14px;background:#fffdf8;color:var(--ink);padding:13px 14px;outline:0}
  textarea{min-height:92px;resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(134,169,182,.18)}
  .step-actions{display:flex;gap:10px;margin-top:24px;align-items:center}
  .loading{text-align:left;max-width:520px;margin:auto}.loading h2,.result h2{font-family:"Cormorant Garamond",Georgia,serif;font-size:2.5rem;line-height:1;margin-bottom:18px}
  .check-list{display:grid;gap:12px;color:var(--muted);font-weight:700}.check{display:flex;gap:10px;align-items:center}.check b{color:#5D4326}
  .result{background:var(--success)}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:20px 0}
  .metric{background:rgba(255,255,255,.52);border:1px solid rgba(93,67,38,.12);border-radius:18px;padding:16px}
  .metric b{display:block;font-size:1.45rem;margin-bottom:4px}.metric span{color:var(--muted);font-size:.9rem;font-weight:700}
  .day-list{display:grid;gap:14px}.day{border:1px solid var(--border);border-radius:20px;background:var(--surface);padding:18px}
  .day-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.day-title{font-family:"Cormorant Garamond",Georgia,serif;font-size:1.55rem;font-weight:700}
  .meal-lines{line-height:1.8;color:var(--ink)}.meal-lines b{color:var(--action)}
  .day-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}.day-actions .btn{padding:10px 14px;font-size:.9rem}
  .sheet-backdrop{position:fixed;inset:0;background:rgba(31,30,28,.32);display:none;z-index:20}.sheet-backdrop.show{display:block}
  .drawer{position:fixed;right:0;top:0;height:100vh;width:min(430px,100%);background:var(--surface);border-left:1px solid var(--border);box-shadow:0 20px 60px rgba(31,30,28,.18);padding:24px;transform:translateX(105%);transition:.22s;z-index:30;overflow:auto}
  .drawer.show{transform:translateX(0)}.drawer-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.x{border:0;background:transparent;font-size:1.6rem;color:var(--muted)}
  .radio-list{display:grid;gap:10px}.radio{border:1.5px solid var(--border);border-radius:14px;padding:14px;background:#fffdf8;font-weight:800;text-align:left}.radio.selected{background:var(--plum-soft);border-color:var(--plum)}
  .memory-note{border:1px solid var(--border);border-radius:16px;background:#fffdf8;padding:14px;margin-top:16px;color:var(--muted);line-height:1.45}
  .bottom-nav{display:none}
  .muted{color:var(--muted)}
  @media(max-width:780px){
    .main{padding:12px 12px 84px}.shell{width:100%}.app-header{padding:8px 4px 4px;margin-bottom:12px}.brand{font-size:1.22rem}.bird-logo{width:36px;height:36px}.header-link{display:none}.hero{padding:24px 20px;border-radius:24px;box-shadow:none}h1{font-size:2.35rem}.lead{font-size:.98rem}.history-strip{display:none}.card{padding:22px;border-radius:22px;box-shadow:none}.options,.fields,.result-grid{grid-template-columns:1fr}.question{font-size:1.45rem}.step-actions{flex-direction:column}.step-actions .btn{width:100%}.drawer{top:auto;bottom:0;height:min(82vh,680px);width:100%;border-left:0;border-top:1px solid var(--border);border-radius:24px 24px 0 0;transform:translateY(105%)}.drawer.show{transform:translateY(0)}.bottom-nav{display:flex;position:fixed;left:0;right:0;bottom:0;background:rgba(255,253,248,.94);border-top:1px solid var(--border);padding:9px 16px calc(9px + env(safe-area-inset-bottom));justify-content:space-around;z-index:10}.bottom-nav span{font-size:.78rem;color:var(--muted);font-weight:800}.bottom-nav span.active{color:var(--action)}
  }
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <div class="shell">
      <header class="app-header">
        <button class="brand-line" onclick="renderHome()" aria-label="На главную"><span class="bird-logo" aria-hidden="true"></span><div><div class="brand">Журка</div></div></button>
        <div class="header-actions">
          <button class="header-link" onclick="scrollToHistory()">История планов</button>
          <button class="header-link" onclick="openCabinet()">Личный кабинет</button>
        </div>
      </header>
      <div id="view"></div>
    </div>
  </main>
</div>
<div class="sheet-backdrop" id="backdrop" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>
<nav class="bottom-nav"><span class="active">План</span><span>История</span><span>Профиль</span></nav>

<script>
'use strict';
const $=id=>document.getElementById(id);
const H={'Content-Type':'application/json'};
const view=$('view');
let step=0, currentDays=null, currentTarget=null, replaceCtx={}, tempMemory=[], permanentMemory=JSON.parse(localStorage.getItem('zhurka_memory')||'[]');
let authToken=localStorage.getItem('zhurka_token')||'', authName=localStorage.getItem('zhurka_name')||'';
const state={goal:'',sex:'female',age:'30',height:'165',weight:'60',activity:'moderate',restrictions:'',format:''};
const steps=[
  {title:'Какая сейчас цель?',key:'goal',type:'options',options:[['loss','Похудеть'],['maintain','Поддерживать'],['gain','Набрать'],['unknown','Пока не знаю']]},
  {title:'Базовые данные',type:'fields',fields:[['sex','Пол','select',[['female','Женский'],['male','Мужской']]],['age','Возраст','number']]},
  {title:'Параметры',type:'fields',fields:[['height','Рост, см','number'],['weight','Вес, кг','number']]},
  {title:'Активность и ограничения',type:'mixed'},
  {title:'Как собрать план?',key:'format',type:'options',options:[['ready','Готовые блюда'],['recipes','Рецепты'],['mixed','Смешанный вариант']]}
];
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function renderHome(){
  view.innerHTML=`<section class="hero"><div class="kicker">Персональный план</div><h1>Соберём питание на неделю за пару минут</h1><p class="lead">Ответьте на несколько вопросов — Журка подберёт рацион и подготовит корзину.</p><div class="steps-note"><b>Как это работает</b><br/>Журка задаст несколько простых вопросов и соберёт план на неделю с возможностью сразу сделать заказ.</div><button class="btn" onclick="startPlan()">Подобрать рацион</button></section>${historyHtml()}`;
}
function scrollToHistory(){const el=document.getElementById('historyStrip'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});}
function savedPlans(){try{return JSON.parse(localStorage.getItem('zhurka_plans')||'[]')}catch(e){return []}}
function historyHtml(){
  const plans=savedPlans();
  if(!plans.length) return `<section class="history-strip" id="historyStrip"><div><b>История</b><br/><span>Здесь появятся планы, которые вы сохраните после сборки.</span></div><div class="history-items"><span class="history-pill">Пока пусто</span></div></section>`;
  return `<section class="history-strip" id="historyStrip"><div><b>История</b><br/><span>${authToken?'Синхронизируются в профиле':'Сохранены в этом браузере'}</span></div><div class="history-items">${plans.slice(0,4).map((p,i)=>`<button class="history-pill" onclick="openSavedPlan(${i})">${esc(historyTitle(p))}</button>`).join('')}</div></section>`;
}
function historyTitle(p){return String(p?.title||'').replace(/^План от\s+/,'')||'Без даты';}
function openSavedPlan(i){const p=savedPlans()[i]; if(!p)return; currentDays=p.days; currentTarget=p.target; renderPlan();}
function startPlan(){step=0;renderStep();}
function progress(){return `<div class="progress-label">Шаг ${step+1} из ${steps.length}</div><div class="dots">${steps.map((_,i)=>`<span class="dot ${i<=step?'on':''}"></span>`).join('')}</div>`;}
function renderStep(){
  const s=steps[step]; let body='';
  if(s.type==='options') body=`<div class="options">${s.options.map(([v,l])=>`<button class="option ${state[s.key]===v?'selected':''}" onclick="choose('${s.key}','${v}')">${l}</button>`).join('')}</div>`;
  if(s.type==='fields') body=`<div class="fields">${s.fields.map(f=>fieldHtml(f)).join('')}</div><div class="step-actions"><button class="btn" onclick="saveFields()">Продолжить</button>${backBtn()}</div>`;
  if(s.type==='mixed') body=`<div class="fields"><div class="field"><label>Активность</label><select id="activity"><option value="sedentary">Сидячая</option><option value="light">Низкая</option><option value="moderate" selected>Умеренная</option><option value="high">Высокая</option></select></div><div class="field"><label>Что исключить</label><textarea id="restrictions" placeholder="например: свинину, грибы, острое">${esc(state.restrictions)}</textarea></div></div><div class="step-actions"><button class="btn" onclick="saveMixed()">Продолжить</button>${backBtn()}</div>`;
  view.innerHTML=`<section class="card">${progress()}<div class="question">${s.title}</div>${body}${s.type==='options'?`<div class="step-actions">${backBtn()}</div>`:''}</section>`;
  if(s.type==='mixed') $('activity').value=state.activity;
}
function fieldHtml(f){
  const [key,label,type,opts]=f;
  if(type==='select') return `<div class="field"><label>${label}</label><select id="${key}">${opts.map(([v,l])=>`<option value="${v}" ${state[key]===v?'selected':''}>${l}</option>`).join('')}</select></div>`;
  return `<div class="field"><label>${label}</label><input id="${key}" type="${type}" value="${esc(state[key])}"/></div>`;
}
function backBtn(){return `<button class="btn secondary" onclick="${step>0?'prevStep()':'renderHome()'}">← Назад</button>`;}
function choose(k,v){state[k]=v; nextStep();}
function saveFields(){steps[step].fields.forEach(f=>state[f[0]]=$(f[0]).value); nextStep();}
function saveMixed(){state.activity=$('activity').value;state.restrictions=$('restrictions').value.trim();nextStep();}
function prevStep(){if(step>0){step--;renderStep();}}
function nextStep(){if(step<steps.length-1){step++;renderStep();}else authToken?buildPlan():renderAuthChoice();}
function renderAuthChoice(){
  view.innerHTML=`<section class="card auth-card"><button class="back-mini" onclick="step=steps.length-1;renderStep()">← Назад</button><h2 style="font-size:2rem;margin-bottom:10px">Продолжить как гость или создать профиль?</h2><p class="lead" style="margin-bottom:0">Можно создать профиль, чтобы планы сохранялись в личном кабинете, или продолжить без регистрации. В этом случае история сохранится только в этом браузере.</p><div class="auth-tabs"><button class="btn" onclick="showAuthForm('register')">Создать профиль</button><button class="btn secondary" onclick="buildPlan()">Продолжить как гость</button></div><button class="btn soft" onclick="showAuthForm('login')">Уже есть аккаунт</button><div id="authArea"></div></section>`;
}
function showAuthForm(kind){
  $('authArea').innerHTML=`<div class="auth-fields">${kind==='register'?'<input id="authName" placeholder="Имя"/>':''}<input id="authEmail" type="email" placeholder="Почта"/><input id="authPass" type="password" placeholder="Пароль"/><button class="btn" onclick="emailAuth('${kind}')">${kind==='register'?'Создать аккаунт':'Войти'} и получить рацион</button></div>`;
}
async function emailAuth(kind){
  const email=$('authEmail').value.trim(), password=$('authPass').value, name=$('authName')?$('authName').value.trim():'';
  if(!email||!password){alert('Введите почту и пароль');return;}
  try{
    const r=await fetch('api/self-serve/'+kind,{method:'POST',headers:H,body:JSON.stringify({email,password,name})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Не удалось войти');
    authToken=d.token; authName=d.name||email; localStorage.setItem('zhurka_token',authToken); localStorage.setItem('zhurka_name',authName);
    buildPlan();
  }catch(e){alert(e.message||'Не удалось войти');}
}
function targetPayload(){return {sex:state.sex,weight:+state.weight,height:+state.height,age:+state.age,activity:state.activity,goal:state.goal==='unknown'?'maintain':state.goal};}
async function buildPlan(){
  renderLoading();
  const wait=new Promise(r=>setTimeout(r,3600));
  try{
    let target;
    try{target=await(await fetch('api/self-serve/kbju',{method:'POST',headers:H,body:JSON.stringify(targetPayload())})).json();}
    catch(e){target={kcal:1750,protein:120,fat:60,carbs:180};}
    currentTarget=target;
    const b={kcal:+target.kcal,protein:+target.protein,fat:+target.fat,carbs:+target.carbs,meal_count:3,restrictions:state.restrictions||null,days_count:7};
    try{const r=await(await fetch('api/self-serve/week',{method:'POST',headers:H,body:JSON.stringify(b)})).json();currentDays=r.days||fallbackDays();}
    catch(e){currentDays=fallbackDays();}
    await wait; saveCurrentPlan(); renderResult();
  }catch(e){await wait; currentTarget={kcal:1750,protein:120,fat:60,carbs:180}; currentDays=fallbackDays(); saveCurrentPlan(); renderResult();}
}
async function saveCurrentPlan(){
  if(!currentDays||!currentTarget) return;
  const now=new Date();
  const title=now.toLocaleDateString('ru-RU',{day:'2-digit',month:'long'});
  const entry={id:Date.now(),title,created_at:now.toISOString(),target:currentTarget,days:currentDays};
  const plans=savedPlans().filter(p=>String(p.id)!==String(entry.id));
  plans.unshift(entry); localStorage.setItem('zhurka_plans',JSON.stringify(plans.slice(0,12)));
  if(authToken){
    try{await fetch('api/self-serve/plan/save',{method:'POST',headers:H,body:JSON.stringify({token:authToken,tg_user:{},plan:{target:currentTarget,days:currentDays}})});}catch(e){}
  }
}
function renderLoading(){view.innerHTML=`<section class="card loading"><h2>Журка составляет ваш план...</h2><div class="check-list"><div class="check"><b>✓</b> учитывает цель</div><div class="check"><b>✓</b> подбирает блюда</div><div class="check"><b>✓</b> собирает корзину</div></div></section>`;}
function avgTarget(){return {kcal:Math.round(currentTarget?.kcal||1750),protein:Math.round(currentTarget?.protein||120),fat:Math.round(currentTarget?.fat||60),carbs:Math.round(currentTarget?.carbs||180)};}
function renderResult(){const t=avgTarget();view.innerHTML=`<section class="card result"><button class="back-mini" onclick="${authToken?'step=steps.length-1;renderStep()':'renderAuthChoice()'}">← Назад</button><h2>Готово</h2><div class="result-grid"><div class="metric"><b>✓ 7 дней</b><span>план на неделю</span></div><div class="metric"><b>✓ 21 приём пищи</b><span>завтраки, обеды и ужины</span></div><div class="metric"><span>В среднем за день</span><b>${t.kcal} ккал</b><span>Б ${t.protein} • Ж ${t.fat} • У ${t.carbs}</span></div></div><div class="step-actions"><button class="btn" onclick="makeWeekCart()">Собрать корзину на неделю</button><button class="btn secondary" onclick="renderPlan()">Посмотреть план</button></div></section>`;}
function shortDishName(name){return String(name||'Блюдо').replace(/^Комбо-набор:\s*/i,'').replace(/\s+\d+\s*г\b/ig,'').split(',')[0].trim();}
const WD=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
function renderPlan(){
  if(!currentDays) currentDays=fallbackDays();
  view.innerHTML=`<section><button class="back-mini" onclick="renderResult()">← Назад</button><div class="day-head" style="margin-bottom:18px"><div><h1 style="font-size:2rem;margin:0">План на неделю</h1></div><button class="btn" onclick="makeWeekCart()">Собрать корзину на неделю</button></div><div class="day-list">${currentDays.map(dayCard).join('')}</div></section>`;
}
function dayCard(day,i){
  return `<article class="day"><div class="day-head"><div class="day-title">${WD[i%7]}</div></div><div class="meal-lines">${(day.meals||[]).map(m=>`<div><b>${esc(m.meal_label)}:</b> ${esc((m.dishes||[]).slice(0,2).map(d=>shortDishName(d.name)).join(' + ')||'подбор блюда')}</div>`).join('')}</div><div class="day-actions"><button class="btn secondary" onclick="openDetails(${i})">Детали</button><button class="btn soft" onclick="openReplaceMeal(${i})">Заменить</button></div></article>`;
}
function openDrawer(html){$('drawer').innerHTML=html;$('backdrop').classList.add('show');$('drawer').classList.add('show');}
function closeDrawer(){$('backdrop').classList.remove('show');$('drawer').classList.remove('show');}
function openCabinet(){
  const plans=savedPlans();
  if(authToken){
    openDrawer(`<div class="drawer-head"><h2>Личный кабинет</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Профиль: <b style="color:var(--ink)">${esc(authName||'пользователь')}</b></p><div class="memory-note">Сохранённых планов: ${plans.length}</div><div class="step-actions"><button class="btn secondary" onclick="logout()">Выйти</button></div>`);
    return;
  }
  openDrawer(`<div class="drawer-head"><h2>Личный кабинет</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Создайте профиль, чтобы планы сохранялись не только в этом браузере.</p><div class="step-actions"><button class="btn" onclick="showCabinetAuthForm('register')">Создать профиль</button><button class="btn secondary" onclick="closeDrawer()">Продолжить как гость</button></div><button class="btn soft" style="margin-top:10px" onclick="showCabinetAuthForm('login')">Уже есть аккаунт</button>`);
}
function logout(){authToken='';authName='';localStorage.removeItem('zhurka_token');localStorage.removeItem('zhurka_name');closeDrawer();renderHome();}
function showCabinetAuthForm(kind){
  openDrawer(`<div class="drawer-head"><h2>${kind==='register'?'Создать профиль':'Войти'}</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="auth-fields">${kind==='register'?'<input id="authName" placeholder="Имя"/>':''}<input id="authEmail" type="email" placeholder="Почта"/><input id="authPass" type="password" placeholder="Пароль"/><button class="btn" onclick="profileAuth('${kind}')">${kind==='register'?'Создать профиль':'Войти'}</button></div><button class="back-mini" style="margin-top:16px" onclick="openCabinet()">← Назад</button>`);
}
async function profileAuth(kind){
  const email=$('authEmail').value.trim(), password=$('authPass').value, name=$('authName')?$('authName').value.trim():'';
  if(!email||!password){alert('Введите почту и пароль');return;}
  try{
    const r=await fetch('api/self-serve/'+kind,{method:'POST',headers:H,body:JSON.stringify({email,password,name})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Не удалось войти');
    authToken=d.token; authName=d.name||email; localStorage.setItem('zhurka_token',authToken); localStorage.setItem('zhurka_name',authName);
    openCabinet(); renderHome();
  }catch(e){alert(e.message||'Не удалось войти');}
}
function openDetails(i){
  const day=currentDays[i];
  openDrawer(`<div class="drawer-head"><h2>${WD[i%7]}</h2><button class="x" onclick="closeDrawer()">×</button></div>${(day.meals||[]).map((m,mi)=>`<div class="day" style="box-shadow:none;margin-bottom:12px"><b>${esc(m.meal_label)}</b>${(m.dishes||[]).map(d=>dishDetailHtml(d)).join('')}<button class="btn soft" style="margin-top:10px;padding:10px 14px" onclick="openReplaceReason(${i},${mi})">Заменить</button></div>`).join('')}`);
}
function dishDetailHtml(d){
  const n=d.nutrition||{}, img=d.image_url?`<img class="dish-photo" src="${esc(d.image_url)}" alt="">`:`<div class="dish-photo"></div>`;
  const price=d.price?` · ${d.price} ₽`:'';
  return `<div class="dish-detail">${img}<div class="muted"><b style="color:var(--ink)">${esc(d.name)}</b><br/>${Math.round(n.calories||0)} ккал${price}</div></div>`;
}
function openReplaceMeal(i){
  replaceCtx={dayIdx:i};
  openDrawer(`<div class="drawer-head"><h2>Что хотите заменить?</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="radio-list">${(currentDays[i].meals||[]).map((m,mi)=>`<button class="radio" onclick="openReplaceReason(${i},${mi})">${esc(m.meal_label)}</button>`).join('')}</div>`);
}
function openReplaceReason(dayIdx,mealIdx){
  replaceCtx={dayIdx,mealIdx};
  const reasons=['Не люблю','Аллергия','Слишком дорого','Нет в доставке','Уже готовил недавно','Другое...'];
  openDrawer(`<div class="drawer-head"><h2>Почему?</h2><button class="x" onclick="closeDrawer()">×</button></div><div class="radio-list">${reasons.map(r=>`<button class="radio" onclick="replaceDish('${esc(r)}')">${esc(r)}</button>`).join('')}</div>`);
}
async function replaceDish(reason){
  const {dayIdx,mealIdx}=replaceCtx, day=currentDays[dayIdx], meal=day.meals[mealIdx], old=(meal.dishes||[])[0], n=(old&&old.nutrition)||{};
  tempMemory.push({day:WD[dayIdx%7],meal:meal.meal_label,reason});
  openDrawer(`<div class="drawer-head"><h2>Заменяю...</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка подбирает другой вариант.</p>`);
  try{
    const res=await fetch('api/self-serve/replace-dish',{method:'POST',headers:H,body:JSON.stringify({meal_label:meal.meal_label,meal_type:meal.meal_type||meal.meal_label,kbju:{kcal:n.calories||500,protein:n.protein||30,fat:n.fat||15,carbs:n.carbohydrates||50},restrictions:state.restrictions||null,exclude_xml_ids:(meal.dishes||[]).map(x=>x.xml_id).filter(Boolean)})});
    const data=await res.json(); if(data.dish) meal.dishes[0]=data.dish;
  }catch(e){ meal.dishes[0]={name:'Индейка с булгуром',nutrition:{calories:520,protein:38,fat:16,carbohydrates:54},in_cart:true}; }
  const newName=shortDishName(meal.dishes[0].name);
  openDrawer(`<div class="drawer-head"><h2>Заменили ${meal.meal_label.toLowerCase()}</h2><button class="x" onclick="closeDrawer()">×</button></div><p>Новый вариант: <b>${esc(newName)}</b>.</p><div class="memory-note">Запомнить это для следующих планов?<div class="step-actions"><button class="btn" onclick="saveMemory('${esc(reason)}')">Да, запомнить</button><button class="btn secondary" onclick="closeDrawer();renderPlan()">Только сейчас</button></div></div>`);
}
function saveMemory(reason){permanentMemory.push(reason);localStorage.setItem('zhurka_memory',JSON.stringify(permanentMemory));closeDrawer();renderPlan();}
async function makeWeekCart(){
  if(!currentDays) return;
  openDrawer(`<div class="drawer-head"><h2>Собираю корзину...</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Журка собирает продукты и готовые блюда на неделю.</p>`);
  try{const r=await(await fetch('api/self-serve/cart',{method:'POST',headers:H,body:JSON.stringify({days:currentDays})})).json();openDrawer(`<div class="drawer-head"><h2>Корзина готова</h2><button class="x" onclick="closeDrawer()">×</button></div>${r.cart_url?`<p class="muted">Товаров: ${r.count}</p><div class="memory-note">${esc(r.cart_url)}</div>`:'<p class="muted">Не удалось собрать корзину. Попробуйте ещё раз.</p>'}`)}
  catch(e){openDrawer(`<div class="drawer-head"><h2>Что-то не получилось</h2><button class="x" onclick="closeDrawer()">×</button></div><p class="muted">Попробуйте ещё раз.</p>`)}
}
function fallbackDays(){
  const data=[['Омлет с овощами','Курица + киноа','Паста с лососем'],['Йогурт + ягоды','Индейка + булгур','Боул с тунцом'],['Творог с фруктами','Говядина + рис','Рыба + овощи'],['Каша с орехами','Курица + гречка','Паста с томатами'],['Сырники','Индейка + киноа','Лосось + картофель'],['Омлет','Боул с курицей','Ризотто с грибами'],['Йогурт','Курица + булгур','Паста с креветками']];
  return data.map((d,idx)=>({plan_date:String(idx),meals:['Завтрак','Обед','Ужин'].map((label,i)=>({meal_label:label,meal_type:label,dishes:[{name:d[i],nutrition:{calories:[420,650,680][i],protein:[25,45,38][i],fat:[18,20,26][i],carbohydrates:[35,70,78][i]},in_cart:true}]}))}));
}
renderHome();
</script>
