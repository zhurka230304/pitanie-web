<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Журка — Рецепты</title>
<script>
  // SDK Telegram грузим ТОЛЬКО внутри Telegram (Mini App), чтобы обычный сайт
  // не зависел от telegram.org и открывался без VPN в России.
  if(location.hash.indexOf('tgWebApp')>=0 || window.TelegramWebviewProxy || /Telegram/i.test(navigator.userAgent)){
    document.write('\x3Cscript src="https://telegram.org/js/telegram-web-app.js">\x3C/script>');
  }
</script>
<style>
  :root{--green:#4A7C2F;--green-dark:#2D5016;--green-light:#EEF4E6;--bg:#F5F0E8;--white:#FDFAF4;--text:#1C1C1A;--muted:#6b7260;--border:#DDD8CC;--r:16px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:680px;margin:0 auto;padding:16px;padding-bottom:60px}
  h1{font-size:1.4rem;color:var(--green-dark);margin-bottom:2px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:14px}
  .card{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
  .ct{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row label{font-size:.9rem;color:var(--muted)}
  input,select{width:120px;border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;font-size:.95rem;font-weight:600;text-align:right;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
  input:focus,select:focus{border-color:var(--green)}
  .btn{display:block;width:100%;padding:14px;border:none;border-radius:99px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;background:var(--green-dark);color:#fff;margin:8px 0}
  .btn-out{background:none;color:var(--green-dark);border:2px solid var(--green-dark)}
  .btn:active{opacity:.85}.btn:disabled{opacity:.5}
  .day{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
  .day-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .day-title{font-weight:700;color:var(--green-dark)}.kbju{font-size:.78rem;color:var(--muted)}
  .meal{padding:8px 0;border-top:1px solid var(--border)}
  .meal-label{font-weight:600;font-size:.88rem}
  .bk{display:flex;gap:12px;align-items:flex-start;margin-top:6px}
  .thumb{width:88px;height:88px;border-radius:12px;object-fit:cover;flex-shrink:0;cursor:pointer;background:var(--green-light);border:1px solid var(--border)}
  .thumb-e{width:88px;height:88px;border-radius:12px;flex-shrink:0;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:1.8rem}
  .items{font-size:.82rem;color:var(--muted);line-height:1.5}
  .badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--green-light);color:var(--green-dark);margin-left:6px}
  .pill{display:inline-block;font-size:.7rem;background:var(--border);color:var(--muted);border-radius:99px;padding:2px 8px;margin-left:6px}
  .session{background:var(--green-light);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:.85rem}
  .shop li{font-size:.85rem;padding:3px 0}.shop{margin-left:18px}
  .spin{text-align:center;padding:30px;color:var(--muted)}
  .rm{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:20px 12px;overflow-y:auto}
  .rm.show{display:flex}
  .rm-card{background:var(--white);border-radius:var(--r);padding:18px;max-width:560px;width:100%;position:relative;margin:auto}
  .rm-close{position:absolute;top:8px;right:14px;font-size:1.8rem;color:var(--muted);cursor:pointer;line-height:1}
  .cart-link{font-size:.78rem;color:var(--green-dark);word-break:break-all;background:var(--green-light);padding:10px;border-radius:8px;margin:8px 0;line-height:1.5}
  .avatar{width:48px;height:48px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--green-dark);flex-shrink:0;object-fit:cover}
  #cabinet{background:var(--green-light)}
  .tgt{display:flex;gap:6px;flex-wrap:wrap}
  .tgt span{background:var(--white);border-radius:99px;padding:3px 10px;font-size:.78rem;font-weight:600;color:var(--green-dark)}
  .hide{display:none}
</style>
</head>
<body>
<h1>🍳 Журка — Рецепты</h1>
<div class="sub">Подбор рецептов под твои КБЖУ + корзина ингредиентов ВкусВилл</div>

<div class="card" id="cabinet">
  <div style="display:flex;gap:12px;align-items:center">
    <div id="avatar" class="avatar">👤</div>
    <div style="flex:1;min-width:0">
      <div id="cabName" style="font-weight:700;font-size:1rem;color:var(--green-dark)">Личный кабинет</div>
      <div id="cabStatus" class="sub" style="margin:0">Данные сохраняются в этом браузере</div>
    </div>
  </div>
  <div id="cabTargets" style="margin-top:10px"></div>
  <div id="loginArea" style="margin-top:10px"></div>
  <button class="btn btn-out" id="histBtn" onclick="openHistory()" style="margin:10px 0 0;padding:10px">📋 История планов</button>
</div>

<div class="card">
  <div class="ct" onclick="toggle('calc')">Калькулятор КБЖУ <span id="calcArrow">▾</span></div>
  <div id="calc">
    <div class="row"><label>Пол</label>
      <select id="sex"><option value="female">Женский</option><option value="male">Мужской</option></select></div>
    <div class="row"><label>Вес, кг</label><input id="weight" type="number" value="60"/></div>
    <div class="row"><label>Рост, см</label><input id="height" type="number" value="165"/></div>
    <div class="row"><label>Возраст</label><input id="age" type="number" value="30"/></div>
    <div class="row"><label>Активность</label>
      <select id="activity">
        <option value="sedentary">Сидячий (мало движения)</option>
        <option value="light">Низкая (1–3 трен/нед)</option>
        <option value="moderate" selected>Умеренная (3–5 трен/нед)</option>
        <option value="high">Высокая (6–7 трен/нед)</option>
        <option value="very_high">Очень высокая (физ. труд)</option>
      </select></div>
    <div class="row"><label>Цель</label>
      <select id="goal"><option value="loss">Похудение</option><option value="maintain">Поддержание</option><option value="gain">Набор</option></select></div>
    <button class="btn btn-out" onclick="calcKbju()" style="margin-top:8px">Рассчитать КБЖУ</button>
  </div>
</div>

<div class="card">
  <div class="ct">Цели на день (можно править)</div>
  <div class="row"><label>Калории</label><input id="kcal" type="number" value="1950"/></div>
  <div class="row"><label>Белки, г</label><input id="protein" type="number" value="153"/></div>
  <div class="row"><label>Жиры, г</label><input id="fat" type="number" value="68"/></div>
  <div class="row"><label>Углеводы, г</label><input id="carbs" type="number" value="160"/></div>
</div>

<div class="card">
  <div class="ct">Как часто готовишь?</div>
  <div class="row"><label>🍳 Завтрак</label>
    <select id="bfreq"><option value="7" selected>каждый день</option><option value="4">через день</option><option value="2">2 раза в неделю</option></select></div>
  <div class="row"><label>🥗 Обед</label>
    <select id="lfreq"><option value="7">каждый день</option><option value="3">3 раза в неделю</option><option value="2" selected>2 раза в неделю</option></select></div>
  <div class="row"><label>🍽 Ужин</label>
    <select id="dfreq"><option value="7">каждый день</option><option value="3">3 раза в неделю</option><option value="2" selected>2 раза в неделю</option></select></div>
  <div class="row"><label>🍎 Перекусы</label>
    <select id="snacks"><option value="0" selected>не нужны</option><option value="1">1 в день</option><option value="2">2 в день</option></select></div>
  <div class="row"><label>🍎 Перекус — готовить</label>
    <select id="sspeed"><option value="1" selected>быстро (без готовки)</option><option value="0">можно подольше</option></select></div>
  <div class="row"><label>🌙 Готовить с вечера</label>
    <select id="overnight"><option value="1" selected>да</option><option value="0">нет</option></select></div>
  <div class="row"><label>Завтрак ≤ мин</label>
    <select id="bt"><option>10</option><option>15</option><option selected>20</option><option>30</option></select></div>
</div>

<div class="card">
  <div class="ct">🚫 Не ем</div>
  <input id="exclude" type="text" placeholder="например: перец, грибы, рыба"
    style="width:100%;padding:10px;border:1px solid #cfe3cf;border-radius:10px;font-size:.95rem;box-sizing:border-box"/>
  <div class="sub" style="margin-top:6px">Через запятую. Блюда и продукты с этими ингредиентами не попадут в план.</div>
</div>

<button class="btn" id="go" onclick="build()">Собрать неделю</button>
<div id="out"></div>

<div class="rm" id="rm" onclick="if(event.target===this)closeRm()">
  <div class="rm-card"><span class="rm-close" onclick="closeRm()">×</span><div id="rmBody"></div></div>
</div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const tg=window.Telegram?.WebApp; if(tg){tg.ready();tg.expand();}
const INIT=tg?.initData||'';
const inTelegram=!!INIT;
const H={'Content-Type':'application/json'};
let BOT='';
let tgUser=null; try{ tgUser=JSON.parse(localStorage.getItem('tgUser')||'null'); }catch(e){}
let lastShopping=null, currentPlan=null, currentParams={};

// режим хранения: сервер (вход через Telegram) или локально в браузере (аноним)
function serverMode(){ return !!(INIT || tgUser); }
function authBody(extra){ return Object.assign({init_data:INIT, tg_user:tgUser||{}}, extra||{}); }
function lsGet(k,def){ try{const v=JSON.parse(localStorage.getItem(k)); return v==null?def:v;}catch(e){return def;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

// колбэк Telegram Login Widget (вход на обычном сайте)
window.onTelegramAuth=function(user){
  tgUser=user; lsSet('tgUser',user);
  loadProfile();
  if(tg) tg.showAlert?.('Вы вошли через Telegram');
};
function logoutTg(){ tgUser=null; localStorage.removeItem('tgUser'); renderCabinet(); }
function injectTgWidget(el){
  el.innerHTML='';
  if(!BOT){ el.innerHTML='<div class="sub" style="margin:0">Можно пользоваться без входа. Вход через Telegram не настроен.</div>'; return; }
  const note=document.createElement('div'); note.className='sub'; note.style.margin='0 0 6px';
  note.textContent='Войдите, чтобы синхронизировать профиль и историю между устройствами:';
  el.appendChild(note);
  const s=document.createElement('script');
  s.async=true; s.src='https://telegram.org/js/telegram-widget.js?22';
  s.setAttribute('data-telegram-login',BOT);
  s.setAttribute('data-size','medium');
  s.setAttribute('data-userpic','false');
  s.setAttribute('data-request-access','write');
  s.setAttribute('data-onauth','onTelegramAuth(user)');
  el.appendChild(s);
}

async function savePlan(){
  if(!currentPlan) return;
  const btn=$('savePlanBtn'); if(btn){btn.disabled=true;btn.textContent='Сохраняю…';}
  try{
    if(serverMode()){
      const r=await(await fetch('api/plan/save',{method:'POST',headers:H,
        body:JSON.stringify(authBody({plan:currentPlan}))})).json();
      if(btn) btn.textContent=r.ok?'✓ Сохранено в историю':'Ошибка';
    }else{
      const plans=lsGet('plans',[]);
      const now=new Date().toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      plans.unshift({id:Date.now(),created_at:now,target:currentPlan.target,plan:currentPlan});
      lsSet('plans',plans.slice(0,30));
      if(btn) btn.textContent='✓ Сохранено в этом браузере';
    }
  }catch(e){ if(btn)btn.textContent='Ошибка'; }
  finally{ if(btn) btn.disabled=false; }
}
function showOut(html){ $('out').innerHTML=html; $('out').scrollIntoView({behavior:'smooth',block:'start'}); }
async function openHistory(){
  showOut('<div class="spin">Загружаю историю…</div>');
  try{
    let plans;
    if(serverMode()){
      const r=await(await fetch('api/plan/history',{method:'POST',headers:H,body:JSON.stringify(authBody())})).json();
      plans=r.plans||[];
    }else{
      plans=lsGet('plans',[]).map(p=>({id:p.id,created_at:p.created_at,target:p.target}));
    }
    if(!plans.length){ showOut('<div class="card sub">Сохранённых планов пока нет. Собери неделю и нажми «💾 Сохранить план в историю».</div>'); return; }
    let h='<div class="card"><div class="ct">📋 История планов</div>';
    plans.forEach(p=>{const t=p.target||{};
      h+=`<div class="row" style="cursor:pointer" onclick="viewHistory('${p.id}')">
        <span>📅 ${p.created_at}</span><span class="sub" style="margin:0">${t.kcal||''} ккал · Б${t.protein||''}</span></div>`;});
    h+='</div>';
    showOut(h);
  }catch(e){ showOut('<div class="card sub" style="color:#c62828">Ошибка загрузки истории</div>'); }
}
async function viewHistory(id){
  showOut('<div class="spin">Загружаю план…</div>');
  try{
    let plan=null;
    if(serverMode()){
      const r=await(await fetch('api/plan/get',{method:'POST',headers:H,body:JSON.stringify(authBody({id:+id}))})).json();
      plan=r.plan;
    }else{
      const f=lsGet('plans',[]).find(p=>String(p.id)===String(id));
      plan=f?f.plan:null;
    }
    if(plan){ currentPlan=plan; lastShopping=Object.keys(plan.shopping_raw_g||{}); render(plan); $('out').scrollIntoView({behavior:'smooth',block:'start'}); }
    else showOut('<div class="card sub">План не найден</div>');
  }catch(e){ showOut('<div class="card sub">Ошибка</div>'); }
}

const PROFILE_FIELDS=['sex','weight','height','age','activity','goal','kcal','protein','fat','carbs','bfreq','lfreq','dfreq','snacks','sspeed','overnight','bt','exclude'];
function collectProfile(){const p={};PROFILE_FIELDS.forEach(k=>{if($(k))p[k]=$(k).value;});return p;}
function applyProfile(profile){ if(!profile) return; PROFILE_FIELDS.forEach(k=>{ if(profile[k]!=null&&$(k))$(k).value=profile[k]; }); }
async function saveProfile(){
  const data=collectProfile();
  if(serverMode()){
    try{await fetch('api/profile/save',{method:'POST',headers:H,body:JSON.stringify(authBody({data}))});}catch(e){}
  }else{
    lsSet('profile',data);
  }
  renderCabinet();
}
function renderCabinet(){
  const u = tg?.initDataUnsafe?.user || tgUser;
  if(u){
    $('cabName').textContent=[u.first_name,u.last_name].filter(Boolean).join(' ')||'Профиль';
    if(u.photo_url) $('avatar').innerHTML=`<img src="${u.photo_url}" style="width:48px;height:48px;border-radius:50%;object-fit:cover"/>`;
    else { $('avatar').innerHTML=''; $('avatar').textContent=(u.first_name||'?')[0].toUpperCase(); }
  }else{
    $('avatar').innerHTML=''; $('avatar').textContent='👤';
    $('cabName').textContent='Гость';
  }
  // статус и зона входа
  const la=$('loginArea');
  if(inTelegram){ $('cabStatus').textContent='Вход через Telegram · данные синхронизируются'; la.innerHTML=''; }
  else if(tgUser){ $('cabStatus').textContent='Вход через Telegram · данные синхронизируются между устройствами';
    la.innerHTML='<button class="btn btn-out" onclick="logoutTg()" style="margin:0;padding:9px">Выйти из Telegram</button>'; }
  else { $('cabStatus').textContent='Данные сохраняются в этом браузере';
    if(!la.querySelector('iframe,script')) injectTgWidget(la); }
  // сводка целей
  const k=$('kcal').value,p=$('protein').value,f=$('fat').value,c=$('carbs').value;
  $('cabTargets').innerHTML= (k? `<div class="tgt"><span>${k} ккал</span><span>Б ${p}</span><span>Ж ${f}</span><span>У ${c}</span></div>`:'');
}
async function loadProfile(){
  let profile=null;
  if(serverMode()){
    try{ const r=await(await fetch('api/profile/get',{method:'POST',headers:H,body:JSON.stringify(authBody())})).json();
      profile=r.profile; }catch(e){}
  }else{
    profile=lsGet('profile',null);
  }
  applyProfile(profile);
  renderCabinet();
}
async function initApp(){
  try{ const c=await(await fetch('api/config')).json(); BOT=c.bot_username||''; }catch(e){}
  await loadProfile();
}
initApp();

function toggle(id){const e=$(id);e.classList.toggle('hide');$('calcArrow').textContent=e.classList.contains('hide')?'▸':'▾';}

async function calcKbju(){
  try{
    const b={sex:$('sex').value,weight:+$('weight').value,height:+$('height').value,age:+$('age').value,activity:$('activity').value,goal:$('goal').value};
    const r=await(await fetch('api/kbju',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json();
    $('kcal').value=r.kcal;$('protein').value=r.protein;$('fat').value=r.fat;$('carbs').value=r.carbs;
    toggle('calc');saveProfile();
  }catch(e){alert('Ошибка расчёта');}
}

async function build(){
  saveProfile();
  const btn=$('go');btn.disabled=true;btn.textContent='Считаю...';
  $('out').innerHTML='<div class="spin">Собираю меню…</div>';
  try{
    const b={kcal:+$('kcal').value,protein:+$('protein').value,fat:+$('fat').value,carbs:+$('carbs').value,
      breakfast_max_time:+$('bt').value,breakfast_freq:+$('bfreq').value,lunch_freq:+$('lfreq').value,
      dinner_freq:+$('dfreq').value,snacks:+$('snacks').value,overnight:+$('overnight').value,
      snack_quick:+$('sspeed').value,exclude:$('exclude').value||'',days:7};
    const r=await(await fetch('api/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})).json();
    lastShopping=Object.keys(r.shopping_raw_g||{});
    currentPlan=r; currentParams=b;
    render(r);
  }catch(e){$('out').innerHTML='<div class="card" style="color:#c62828">'+e.message+'</div>';}
  finally{btn.disabled=false;btn.textContent='Собрать неделю';}
}

const WD=['пн','вт','ср','чт','пт','сб','вс'];
let allMeals=[];

function frac(x){const o=[[0.25,'¼'],[0.33,'⅓'],[0.5,'½'],[0.67,'⅔'],[0.75,'¾'],[1,'1'],
 [1.25,'1¼'],[1.5,'1½'],[1.75,'1¾'],[2,'2'],[2.5,'2½'],[3,'3'],[4,'4']];
 let b=o[0];for(const e of o)if(Math.abs(e[0]-x)<Math.abs(b[0]-x))b=e;return b[1];}

// штучные продукты в закупке: средний вес 1 шт (г)
const PIECE_G={'Яйца':55,'Лаваш':80,'Тортилья':80,'Бананы':120,'Яблоки':180,'Груши':180,
 'Огурцы':100,'Болгарский перец':150,'Авокадо':150,'Кабачок':250,'Помидоры':120,
 'Морковь':90,'Киви':75,'Баклажан':250,'Свёкла':150,'Лук':90};
// крупы/макароны в закупке — показываем в стаканах (г в стакане)
const GRAIN_CUP={'Гречка':180,'Рис':180,'Киноа':180,'Булгур':180,'Перловка':180,
 'Овсяные хлопья':90,'Кускус':180,'Макароны':100};
function shopAmount(name,g){
  if(GRAIN_CUP[name]){const c=Math.round(g/GRAIN_CUP[name]*2)/2;
    return `~${c} стак. (${g>=1000?(g/1000).toFixed(1)+' кг':g+' г'})`;}
  if(PIECE_G[name]){const n=g/PIECE_G[name];
    return n>=1?`~${Math.round(n)} шт`:`~${frac(n)} шт`;}
  return `~${g>=1000?(g/1000).toFixed(1)+' кг':g+' г'}`;
}

// г/мл -> бытовые меры. CUP_G — г в стакане (250 мл) для каждого продукта
const CUP_G={'мука':130,'овсян':90,'геркулес':90,'хлоп':90,'гречк':180,'рис':180,
 'киноа':180,'булгур':180,'перлов':180,'пшено':180,'кускус':180,'сахар':200,'подсласт':200,
 'какао':100,'творог':250,'йогурт':250,'сметан':250,'сливк':250,'молок':250,'вода':250,
 'сок':250,'кефир':250,'мёд':340,'мед':340,'масло':220,'орех':140,'миндал':140,'семен':150,
 'мак':150,'ягод':150,'черник':150,'голуб':150,'малин':150,'клубн':150};
// овощи/фрукты, которые удобнее считать в долях штуки (подстрока названия -> вес шт, г)
const PIECE_FRAC=[['авокадо',150],['огур',100],['цукини',250],['кабач',250],
 ['морков',90],['репчат',90],['луковиц',90],['лук',90]];
function pieceVeg(name){const n=(name||'').toLowerCase();
  if(n.includes('зелён')||n.includes('порей')) return null;
  for(const [k,w] of PIECE_FRAC) if(n.includes(k)) return w;
  return null;}
function friendly(name,amount,unit){
  if(amount==null||amount==='') return unit&&unit!=='по вкусу'?unit:'по вкусу';
  const u=(unit||'').toLowerCase();
  if(['шт','зуб','долька','веточка','щепотка','горсть','ст.л.','ч.л.','стакан','саше','мерн.ложки'].includes(u))
    return amount+' '+unit;
  if(u!=='г'&&u!=='гр'&&u!=='мл') return amount+' '+(unit||'');
  const n=(name||'').toLowerCase();
  // авокадо/огурец/кабачок/лук/морковь — в долях штуки (½, ⅓, целая)
  const pv=pieceVeg(name);
  if(pv) return `${frac(amount/pv)} шт`;
  // сливочное масло — в граммах, а не в ложках
  if(n.includes('сливочн')) return amount+' '+unit;
  let cup=null;
  for(const k in CUP_G) if(n.includes(k)){cup=CUP_G[k];break;}
  if(!cup) return amount+' '+unit;          // мясо/овощи/сыр — граммы понятны
  const cups=amount/cup;
  if(cups>=0.22) return `${frac(cups)} стак. (${amount} ${unit})`;
  const tbsp=amount/(cup/16);
  if(tbsp>=0.9) return `${Math.round(tbsp)} ст.л. (${amount} ${unit})`;
  return `${Math.max(1,Math.round(amount/(cup/48)))} ч.л. (${amount} ${unit})`;
}
function closeRm(){$('rm').classList.remove('show');}
function openRecipe(idx){
  const m=allMeals[idx]; if(!m) return;
  const ings=(m.ingredients||[]).map(x=>`<li>${x.name} — ${friendly(x.name,x.amount,x.unit)}</li>`).join('');
  const steps=(m.steps||[]).map((s,i)=>`<li>${s}</li>`).join('');
  const photo=m.image?`<img src="${m.image}" style="width:100%;border-radius:12px;margin-bottom:12px"/>`:'';
  const est=m.estimated?' <span class="pill">КБЖУ приблизит.</span>':'';
  $('rmBody').innerHTML=`${photo}
    <h2 style="color:var(--green-dark);font-size:1.2rem;margin-bottom:4px">${m.title}</h2>
    <div class="sub">${m.label}${m.time_min?' · '+m.time_min+' мин':''}</div>
    <div class="badge" style="margin:0 0 12px">${m.nutrition.kcal} ккал · Б${m.nutrition.protein} Ж${m.nutrition.fat} У${m.nutrition.carbs}${est}</div>
    ${m.note?`<div class="sub" style="color:var(--green-dark);margin-bottom:10px">🍽 ${m.note}</div>`:''}
    ${ings?`<div class="ct">Ингредиенты</div><ul class="shop">${ings}</ul>`:''}
    ${steps?`<div class="ct" style="margin-top:12px">Приготовление</div><ol style="margin-left:18px;font-size:.9rem;line-height:1.6">${steps}</ol>`:''}`;
  $('rm').classList.add('show');
}

function mealBlock(m,emoji,slot){
  const idx=allMeals.push(m)-1;
  const ings=(m.ingredients||[]).map(x=>x.name+' '+friendly(x.name,x.amount,x.unit)).join(', ');
  const time=m.time_min?`<span class="pill">${m.time_min} мин</span>`:'';
  const est=m.estimated?'<span class="pill">КБЖУ ~</span>':'';
  const thumb=m.image?`<img class="thumb" src="${m.image}" onclick="openRecipe(${idx})"/>`:`<div class="thumb-e" onclick="openRecipe(${idx})">${emoji}</div>`;
  const note=m.note?`<br><span style="color:var(--green-dark);font-size:.82rem">🍽 ${m.note}</span>`:'';
  const swap=slot?`<button onclick="swapMeal(${slot.day},'${slot.kind}',${slot.pos==null?-1:slot.pos})" style="float:right;background:#eef6ee;border:1px solid #cfe3cf;border-radius:8px;padding:3px 9px;font-size:.78rem;color:var(--green-dark);cursor:pointer">🔄 заменить</button>`:'';
  return `<div class="meal"><div class="meal-label">${m.label} ${time}${est}<span class="badge">${m.nutrition.kcal} ккал · Б${m.nutrition.protein}</span>${swap}</div>
    <div class="bk">${thumb}<div class="items" onclick="openRecipe(${idx})" style="cursor:pointer"><b>${m.title}</b><br>${ings}${note}<br><span style="color:var(--green-dark)">👆 нажми — рецепт</span></div></div></div>`;
}

async function swapMeal(dayIdx,kind,pos){
  if(!currentPlan) return;
  const day=currentPlan.days[dayIdx];
  const cur=kind==='breakfast'?day.breakfast:day.meals[pos];
  const body={kind,kcal:cur.nutrition.kcal,label:cur.label,exclude:currentParams.exclude||'',
    avoid_id:String(cur.id),overnight:!!currentParams.overnight,
    breakfast_max_time:currentParams.breakfast_max_time||20,snack_quick:!!currentParams.snack_quick};
  try{
    const r=await(await fetch('api/plan/swap',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
    if(!r.meal) return;
    if(kind==='breakfast') day.breakfast=r.meal; else day.meals[pos]=r.meal;
    recomputeDay(day);
    await refreshShopping();
    render(currentPlan);
  }catch(e){ if(tg)tg.showAlert?.('Не удалось заменить блюдо'); }
}
function recomputeDay(day){
  const ks=['kcal','protein','fat','carbs']; day.day_total={};
  ks.forEach(k=>day.day_total[k]=Math.round((day.breakfast.nutrition[k]||0)+day.meals.reduce((s,m)=>s+(m.nutrition[k]||0),0)));
}
async function refreshShopping(){
  const ings=[]; currentPlan.days.forEach(d=>[d.breakfast,...d.meals].forEach(m=>(m.ingredients||[]).forEach(i=>ings.push(i))));
  try{const r=await(await fetch('api/shopping',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ingredients:ings})})).json();
    if(r.shopping_raw_g){currentPlan.shopping_raw_g=r.shopping_raw_g; lastShopping=Object.keys(r.shopping_raw_g);}}catch(e){}
}

function render(p){
  allMeals=[];
  let h='';
  h+='<button class="btn" id="savePlanBtn" onclick="savePlan()" style="margin-top:0">💾 Сохранить план в историю</button>';
  h+='<div class="card"><div class="ct">🔥 Регулярность готовки</div>';
  (p.cook_schedule||[]).forEach(s=>{const dd=s.days&&s.days.length?(' · дни: '+s.days.map(d=>WD[(d-1)%7]).join(', ')):'';
    h+=`<div class="session"><b>${s.meal}</b> — ${s.label}${dd}</div>`;});
  h+='</div>';
  p.days.forEach((day,i)=>{const t=day.day_total;
    h+=`<div class="day"><div class="day-head"><span class="day-title">День ${i+1} (${WD[i%7]})</span><span class="kbju">${t.kcal} · Б${t.protein} Ж${t.fat} У${t.carbs}</span></div>`;
    h+=mealBlock(day.breakfast,'🍳',{day:i,kind:'breakfast'});
    day.meals.forEach((m,j)=>{const snack=m.label&&m.label.indexOf('Перекус')===0;
      h+=mealBlock(m, m.label==='Обед'?'🥗':(snack?'🍎':'🍽'), {day:i,kind:snack?'snack':'main',pos:j});});
    h+='</div>';});
  h+='<div class="card"><div class="ct">🛒 Закупка на неделю</div><ul class="shop">';
  for(const [n,g] of Object.entries(p.shopping_raw_g)) h+=`<li>${n} — ${shopAmount(n,g)}</li>`;
  h+='</ul><button class="btn" id="cartBtn" onclick="makeCart()" style="margin-top:10px">Собрать корзину ВкусВилл</button><div id="cartOut"></div></div>';
  $('out').innerHTML=h;
}

async function makeCart(){
  const btn=$('cartBtn');btn.disabled=true;btn.textContent='Ищу товары…';
  try{
    const r=await(await fetch('api/cart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ingredients:lastShopping})})).json();
    let h='';
    if(r.cart_url){
      h=`<div class="cart-link" id="clink">${r.cart_url}</div>
         <button class="btn btn-out" onclick="copyCart()">Скопировать ссылку</button>
         <div class="sub">Открой в браузере без VPN. Найдено товаров: ${r.found.length}${r.not_found.length?', не нашлось: '+r.not_found.length:''}.</div>`;
    }else{ h='<div class="sub" style="color:#c62828">Не удалось собрать корзину (ВкусВилл не ответил). Попробуй ещё раз.</div>'; }
    $('cartOut').innerHTML=h;
  }catch(e){$('cartOut').innerHTML='<div class="sub" style="color:#c62828">Ошибка</div>';}
  finally{btn.disabled=false;btn.textContent='Собрать корзину ВкусВилл';}
}
function copyCart(){
  const t=$('clink').textContent;const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  if(tg)tg.showAlert?.('Ссылка скопирована');else alert('Скопировано');
}
</script>
